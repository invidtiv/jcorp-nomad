<!DOCTYPE html>
<!-- Version 4 -->
<html lang="en">
<head>
    <link rel="stylesheet" href="/master.css">
    <script src="/theme-boot.js"></script>
    <script src="/nomad-utils.js"></script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Nomad • Books</title>
    <!-- Books page supports epub, audiobook, and PDF formats. Comics (CBZ/CBR/folder) open in comics.html. -->
    <script src="/assets/epub.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        html, body {
            height: 100%
        }

        body {
            font-family: Arial,Helvetica,sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

            body.dark {
                background: var(--bg);
                color: var(--text);
            }

                body.dark .toolbar {
                    background: var(--bg);
                    border-bottom-color: var(--white-alpha-4);
                }

                body.dark .media-card {
                    background: var(--card);
                    box-shadow: var(--shadow-medium);
                }
                body.dark .back-btn { background: var(--white-alpha-12); color: var(--color-white); }
                body.dark .view-btn.active { border-color: var(--primary); }

                body.dark .overlay-title {
                    color: var(--text);
                }

                body.dark .modal-content, body.dark .list-modal-content {
                    background: var(--card);
                    color: var(--text);
                }

                body.dark .reader-container {
                    background: var(--card);
                    color: var(--text);
                }

                body.dark .reader-header {
                    background: var(--card);
                }

                body.dark .reader-navigation {
                    background: var(--card);
                    border-top-color: var(--white-alpha-4);
                }

                body.dark .toc-panel {
                    background: var(--card);
                    border-left: 1px solid var(--white-alpha-6);
                }

                body.dark .audio-player {
                    background: var(--card);
                    backdrop-filter: blur(10px);
                    border-top-color: var(--white-alpha-8);
                }

                body.dark .progress-bar-container {
                    background: var(--progress-dark);
                }

                body.dark .time-info {
                    color: var(--time-dark);
                }

        header {
            position: sticky;
            top: 0;
            z-index: 60;
        }

            header h1 {
                font-size: clamp(1.25rem,4vw,1.75rem);
                margin: 0
            }

        .back-btn {
            text-decoration: none;
            color: #fff;
            background: var(--primary-dark);
            padding: .5rem .75rem;
            border-radius: var(--radius);
            font-size: .95rem
        }

        .toolbar {
            background: var(--bg);
            padding: .65rem 1rem;
            display: flex;
            flex-wrap: nowrap;
            gap: .6rem;
            align-items: center;
            border-bottom: 1px solid var(--line);
            position: sticky;
            top: var(--header-height);
            z-index: 55;
            }

            .toolbar input[type="search"] {
            flex: 1;
            padding: .5rem .75rem;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            font-size: 0.95rem;
            background: var(--card);
            color: var(--text);
            }

            .toolbar select, .toolbar .view-btn {
                padding: .48rem .7rem;
                border: 1px solid var(--line);
                background: var(--card);
                color: var(--text);
                border-radius: var(--radius);
                font-size: 0.9rem;
                cursor: pointer;
            }

        .view-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary-dark);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: calc(1rem + var(--audio-height));
        }

        .grid-wrapper {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px
        }

        .media-grid {
            display: grid;
            gap: 1rem;
        }

            .media-grid.small {
                grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
            }

            .media-grid.medium {
                grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
            }

            .media-grid.large {
                grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
            }

        .media-card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform .25s ease;
            cursor: pointer;
        }

        .media-card:hover {
            transform: translateY(-4px);
        }

        @media (max-width: 768px) {
            .media-grid.medium {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 600px) {
            .media-grid.small {
                grid-template-columns: repeat(2, 1fr);
            }

            .media-grid.medium {
                grid-template-columns: repeat(3, 1fr);
            }

            .media-grid.large {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .media-card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform .25s ease;
            cursor: pointer;
            width: 100%;
            max-width: 220px;
            margin: 0 auto;
        }

        .media-grid.small .media-card {
            max-width: 120px;
        }

        .media-grid.medium .media-card {
            max-width: 160px;
        }

        .media-grid.large .media-card {
            max-width: 220px;
        }

        .media-card.is-directory .thumb-wrapper {
            box-sizing: border-box;
        }

        .folder-icon {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 3;
            font-size: 1.2rem;
            opacity: 0.7;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        body.dark .folder-icon {
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        .media-card:hover {
            transform: translateY(-3px);
        }

        .thumb-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #efeff5;
            color: #555;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            aspect-ratio: 2/3;
        }

        .overlay-title {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            text-align: center;
            font-weight: 700;
            color: #06306f;
            pointer-events: none;
            padding: 6px;
        }

        .media-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0;
            transition: opacity .35s ease;
        }

        .badge-resume {
            position: absolute;
            left: 8px;
            bottom: 8px;
            z-index: 4;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 6px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
        }

        .modal, .list-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content, .list-modal-content {
            background: #fff;
            padding: 16px;
            border-radius: 10px;
            text-align: center;
            width: 92%;
            max-width: 720px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

            /* action modal: even spacing + theme tokens, matches movies/shows */
            #actionModal .modal-content {
                display: flex;
                flex-direction: column;
                gap: 10px;
                max-width: 480px;
                background: var(--card-bg);
                color: var(--text);
                overflow: visible;
            }
            #actionModal .modal-content h2 { margin: 0; }
            #actionSub { font-size: 0.9rem; color: var(--muted); }

            .list-modal-content .list {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
                padding: 12px;
                max-height: 70vh;
                overflow-y: auto;
                text-align: center;
            }

            .list-modal-content .list .media-card {
                max-width: 100%;
                margin: 0;
            }

            .modal-content h2, .list-modal-content h2 {
                margin: 0 0 10px 0
            }

        .btn {
            background: var(--primary);
            color: #fff;
            border: 0;
            padding: 12px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 2px 6px rgba(2,6,23,0.08);
        }

            .btn.small {
                padding: 8px;
                font-size: .9rem;
                width: auto;
                min-width: 96px;
            }

        .btn-muted {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--line);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .list {
            max-height: 420px;
            overflow: auto;
            text-align: left;
            margin-top: 8px
        }

            .list .item {
                display: flex;
                gap: 8px;
                align-items: center;
                padding: 8px;
                border-bottom: 1px solid #f4f4f9
            }

                .list .item .title {
                    flex: 1
                }

                .list .item .meta {
                    font-size: 0.9rem;
                    color: var(--muted)
                }

        .row-buttons {
            display: flex;
            gap: 8px;
            min-width: 120px
        }

        .no-cover-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .book-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform .12s, box-shadow .12s;
            background: transparent;
        }

        .book-row:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(10,12,20,0.04);
        }

        body.dark .book-row:hover {
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .book-row .book-icon {
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .book-row .title {
            font-weight: 700;
            color: var(--primary-dark);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        body.dark .book-row .title {
            color: var(--primary);
        }

        .book-row .context {
            color: var(--muted);
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
        }

            .row-buttons button {
                padding: 8px;
                border-radius: 6px;
                border: 0;
                cursor: pointer
            }

        /* EPUB Reader */
        .reader-container {
            display: none;
            position: fixed;
            inset: 0;
            background: #fff;
            z-index: 2000;
            flex-direction: column;
        }

            .reader-container.active {
                display: flex;
            }

        .reader-header {
            background: var(--primary);
            color: #fff;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .reader-title {
            font-size: 1rem;
            font-weight: 700;
            margin-right: auto;
        }

        .reader-controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .reader-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s ease;
            white-space: nowrap;
        }

            .reader-btn:hover {
                background: rgba(255,255,255,0.3);
            }

        .reader-main {
            flex: 1;
            display: flex;
            min-height: 0;
            position: relative;
            overflow: hidden;
        }

        #epub-viewer {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            overflow: hidden;
            background: #fafafa;
        }

        .reader-navigation {
            background: #f5f5f5;
            padding: 12px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #ddd;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
        }

            .nav-btn:disabled {
                background: #ccc;
                cursor: not-allowed;
            }

        .progress-info {
            color: #333;
            font-weight: 600;
        }

        /* TOC slide-in panel */
        .toc-panel {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: var(--reader-sidebar-width);
            max-width: 80%;
            background: #fff;
            border-left: 1px solid #e5e7eb;
            transform: translateX(100%);
            transition: transform .25s ease;
            z-index: 5;
            display: flex;
            flex-direction: column;
            box-shadow: -8px 0 20px rgba(0,0,0,0.08);
        }

            .toc-panel.open {
                transform: translateX(0%);
            }

        .toc-header {
            padding: 10px 12px;
            font-weight: 700;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toc-content {
            padding: 8px 6px;
            overflow: auto;
            flex: 1;
        }

        .toc-item {
            display: block;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            color: #0f1720;
            text-decoration: none;
            font-size: 0.95rem;
        }

            .toc-item:hover {
                background: #eef3ff;
            }

        .toc-sub {
            padding-left: 16px;
        }

        /* Audiobook Player */
        .audio-player {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
            padding: 12px 16px;
            z-index: 1500;
            border-top: 2px solid var(--primary);
        }

            .audio-player.active {
                display: block;
            }

        .audio-player-inner {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .audio-title {
            font-size: 0.95em;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .audio-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        .audio-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

            .audio-btn:hover {
                background: var(--primary-dark);
                transform: scale(1.05);
            }

            .audio-btn.play-pause {
                padding: 8px 16px;
                font-size: 0.95em;
            }

        .audio-progress-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-bar-container {
            width: 100%;
            height: 7px;
            background: #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 4px;
            width: 0%;
            transition: width 0.1s ease;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            color: var(--muted);
            font-size: 0.8em;
        }

        .audio-actions {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .audio-top-row {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .audio-close-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 1.1em;
            padding: 4px 8px;
            transition: color 0.2s ease;
        }

            .audio-close-btn:hover {
                color: var(--primary);
            }

        @media (max-width:768px) {
            .audio-top-row {
                flex-wrap: wrap;
                justify-content: center;
            }

            .audio-title {
                order: 1;
                flex: 1 1 100%;
            }

            .reader-controls {
                width: 100%;
                justify-content: flex-start;
            }
        }

        @keyframes pop-in {
            0% {
                transform: scale(.97);
                opacity: 0
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }
    </style>
    <script src="theme-manager.js"></script>
</head>
<body>
    <header>
        <h1>Books</h1>
        <a class="back-btn" href="/menu">← Back to Menu</a>
    </header>

    <div class="toolbar">
        <input id="searchInput" type="search" placeholder="Search books…" aria-label="Search books">
        <select id="sortSelect" aria-label="Sort books">
            <option value="nameAsc">A → Z</option>
            <option value="nameDesc">Z → A</option>
        </select>
        <button class="view-btn" data-size="small" title="Compact view">🔳</button>
        <button class="view-btn active" data-size="medium" title="Comfort view">🔲</button>
        <button class="view-btn" data-size="large" title="Gallery view">⬜</button>
    </div>

    <main>
        <div class="grid-wrapper">
            <div id="grid" class="media-grid medium" aria-live="polite" role="list"></div>
        </div>
    </main>

    <div id="listModal" class="list-modal" onclick="if(event.target===this) closeListModal()">
        <div class="list-modal-content" onclick="event.stopPropagation()">
            <h2 id="listModalTitle">Contents</h2>
            <div id="listContainer" class="list" role="list"></div>
            <div style="margin-top:8px"><button id="listCloseBtn" class="btn-muted">Close</button></div>
        </div>
    </div>

    <div id="actionModal" class="modal" onclick="if(event.target===this) closeActionModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 id="actionTitle">What do you want to do?</h2>
            <div id="actionSub"></div>
            <button id="viewButton" class="btn" aria-label="Primary action"></button>
            <button id="downloadButton" class="btn-muted" aria-label="Download file">Download</button>
            <button id="actionCancelBtn" class="btn-muted">Cancel</button>
        </div>
    </div>

    <!-- EPUB Reader -->
    <div class="reader-container" id="readerContainer">
        <div class="reader-header">
            <div class="reader-title" id="readerTitle">Book Title</div>
            <div class="reader-controls">
                <button class="reader-btn" id="tocBtn" title="Table of Contents">📑 TOC</button>
                <button class="reader-btn" id="viewModeBtn" title="Toggle view mode">Pages</button>
                <button class="reader-btn" id="fontSizeDown" title="Decrease font size">A-</button>
                <button class="reader-btn" id="fontSizeUp" title="Increase font size">A+</button>
                <button class="reader-btn" id="closeReader" title="Close reader">✕ Close</button>
            </div>
        </div>
        <div class="reader-main">
            <div id="epub-viewer"></div>
            <aside class="toc-panel" id="tocPanel">
                <div class="toc-header">
                    <span>Table of Contents</span>
                    <button class="reader-btn" id="closeToc" title="Close TOC">✕</button>
                </div>
                <div class="toc-content" id="tocContent"></div>
            </aside>
        </div>
        <div class="reader-navigation">
            <button class="nav-btn" id="prevBtn">← Previous</button>
            <span class="progress-info" id="progressInfo">0%</span>
            <button class="nav-btn" id="nextBtn">Next →</button>
        </div>
    </div>

    <!-- Audiobook Player -->
    <div class="audio-player" id="audioPlayer">
        <div class="audio-player-inner">
            <div class="audio-top-row">
                <div class="audio-title" id="audioTitle">Audiobook</div>
                <button class="audio-close-btn" id="closeAudio" title="Close">✕</button>
            </div>
            <div class="audio-actions">
                <div class="audio-controls">
                    <button class="audio-btn" id="rewind" title="Rewind 15s">⏪ 15s</button>
                    <button class="audio-btn play-pause" id="playPause" title="Play/Pause">▶</button>
                    <button class="audio-btn" id="forward" title="Forward 15s">⏩ 15s</button>
                    <button class="audio-btn" id="speedBtn" title="Speed">1.0x</button>
                </div>
            </div>
            <div class="audio-progress-section">
                <div class="progress-bar-container" id="audioProgressBar">
                    <div class="progress-fill" id="audioProgressFill"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>
        </div>
        <audio id="audioElement" preload="metadata" crossorigin="anonymous"></audio>
    </div>

    <script>
        /* theme via shared ThemeManager instead of a local reimplementation */
        (function () { try { ThemeManager.applyDarkMode(ThemeManager.getDarkMode()); } catch (e) { } })();
        window.addEventListener('storage', (ev) => { if (ev.key === ThemeManager.STORAGE_KEY) ThemeManager.applyDarkMode(ev.newValue === 'true'); });

        /* Constants */
        const ROOT = '/Books';
        const INDEX_ENDPOINT = '/api/index';
        const BOOK_EXTS = ['.pdf', '.epub', '.mobi', '.azw3', '.cbz', '.cbr', '.cbt', '.cb7', '.djvu', '.txt'];
        const AUDIO_EXTS = ['.mp3', '.m4b', '.m4a', '.ogg', '.wav', '.aac', '.flac'];
        const IMAGE_EXTS = ['.jpg', '.jpeg', '.png', '.webp', '.avif', '.gif', '.bmp'];
        const COMIC_EXTS = ['.cbz', '.cbr'];

        /* Utils */
        function ext(name) { const i = name.lastIndexOf('.'); return i >= 0 ? name.slice(i).toLowerCase() : ''; }
        function isBookName(n) { return BOOK_EXTS.includes(ext(n)); }
        function isAudioName(n) { return AUDIO_EXTS.includes(ext(n)); }
        function isImageName(n) { return IMAGE_EXTS.includes(ext(n)); }
        function isComicName(n) { return COMIC_EXTS.includes(ext(n)); }
        function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>\"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '\"': '&quot;', '\'': '&#39;' }[c])); }
        function prettify(filename) {
            if (!filename) return '';
            let base = filename.replace(/\.[^/.]+$/, '');
            let title = base.replace(/[_\.]+/g, ' ').trim();
            title = title.replace(/\s*($$\d{4}$$|\d{4})\s*$/, '').trim();
            return title || filename;
        }
        function fileUrlDirect(path) { if (!path) return ''; return `/media?file=${encodeURIComponent(normalizePath(path))}`; }
        function formatBytes(bytes) {
            if (!bytes && bytes !== 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(Math.max(bytes, 1)) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }
        function formatTime(seconds) {
            if (!seconds || !isFinite(seconds)) return '0:00';
            seconds = Math.floor(seconds);
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hrs) return hrs + ':' + mins.toString().padStart(2, '0') + ':' + secs.toString().padStart(2, '0');
            return mins + ':' + secs.toString().padStart(2, '0');
        }

        /* Resume store */
        const RESUME_KEY = 'nomad_resume_store_v1';
        function readResume() { try { return JSON.parse(localStorage.getItem(RESUME_KEY) || '{}'); } catch (e) { return {}; } }
        function writeResume(obj) { try { localStorage.setItem(RESUME_KEY, JSON.stringify(obj)); } catch (e) { } }
        function fileKey(path, sz, mt) { return `${normalizePath(path)}|${sz || 0}|${mt || 0}`; }
        function findResume(movie) {
            const store = readResume();
            const norm = normalizePath(movie.path);
            const exact = fileKey(movie.path, movie.sz || 0, movie.mt || 0);
            if (store[exact]) return { key: exact, entry: store[exact] };
            for (const k of Object.keys(store)) { const p = (k.split('|')[0] || ''); if (normalizePath(p) === norm) return { key: k, entry: store[k] }; }
            for (const k of Object.keys(store)) { const p = (k.split('|')[0] || '').replace(/^\//, ''); if (p === norm.replace(/^\//, '')) return { key: k, entry: store[k] }; }
            const base = norm.split('/').pop().toLowerCase();
            for (const k of Object.keys(store)) { const p = (k.split('|')[0] || '').toLowerCase(); if (p.split('/').pop() === base) return { key: k, entry: store[k] }; }
            return null;
        }
        function clearResumeFor(path) {
            const store = readResume();
            const norm = normalizePath(path);
            let changed = false;
            for (const k of Object.keys(store)) {
                const p = (k.split('|')[0] || '');
                if (normalizePath(p) === norm || p.replace(/^\//, '') === norm.replace(/^\//, '')) {
                    delete store[k]; changed = true;
                }
            }
            if (changed) writeResume(store);
        }

                            div.textContent = text;

        /* Index fetch (NDJSON) */
        async function fetchIndex(path) {
            const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('index fetch failed ' + res.status);
            const text = await res.text();
            const lines = text.split('\n').filter(Boolean);
            const header = lines.length ? (() => { try { return JSON.parse(lines[0]); } catch (e) { console.warn('index header parse failed', lines[0]); return null; } })() : null;
            const entries = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                try { entries.push(JSON.parse(line)); }
                catch (err) {
                    const brace = line.indexOf('{');
                    if (brace >= 0) { try { entries.push(JSON.parse(line.slice(brace))); continue; } catch (e2) { } }
                    console.warn('index line parse failed', line);
                }
            }
            return { header, entries };
        }

        /* Build top-level library */
        async function buildLibrary() {
            const out = [];
            const rootResp = await fetchIndex(ROOT);

            const rootImages = new Map();
            for (const e of rootResp.entries) {
                if (e.n && e.n.includes('/')) continue;
                if (e.t === 'f' && isImageName(e.n)) {
                    rootImages.set(e.n.replace(/\.[^/.]+$/, '').toLowerCase(), normalizePath((ROOT === '/' ? '' : ROOT) + '/' + e.n));
                }
            }

            for (const e of rootResp.entries) {
                if (e.n && e.n.includes('/')) continue;
                
                if (e.t === 'd') {
                    const seriesName = e.n;
                    const dir = normalizePath((ROOT === '/' ? '' : ROOT) + '/' + seriesName);
                    let cover = null;
                    const variants = [
                        seriesName.toLowerCase(),
                        seriesName.toLowerCase().replace(/\s+/g, '-'),
                        seriesName.toLowerCase().replace(/\s+/g, '_')
                    ];
                    for (const v of variants) { if (rootImages.has(v)) { cover = rootImages.get(v); break; } }
                    if (!cover) ['poster', 'cover', 'folder', 'art'].forEach(k => { if (!cover && rootImages.has(k)) cover = rootImages.get(k); });
                    
                    const isComic = e.comic === true;
                    out.push({ name: seriesName.replace(/[_\.]+/g, ' ').trim(), dir, cover, type: 'dir', isComic });

                } else if (e.t === 'f') {
                    if (isBookName(e.n) || isAudioName(e.n) || isComicName(e.n)) {
                        const p = normalizePath((ROOT === '/' ? '' : ROOT) + '/' + e.n);
                        const base = e.n.replace(/\.[^/.]+$/, '').toLowerCase();
                        const cover = rootImages.has(base) ? rootImages.get(base) : null;
                        out.push({ name: prettify(e.n), dir: null, cover, type: 'file', fileEntry: { name: e.n, path: p, sz: e.sz || 0, mt: e.mt || 0 } });
                    }
                }
            }

            out.sort((a, b) => a.name.localeCompare(b.name));
            return out;
        }
        async function loadDirContents(dir) {
            try {
                const resp = await fetchIndex(dir);
                const files = [];
                const images = new Map();
                
                const normalizedDir = normalizePath(dir);
                
                for (const e of resp.entries) {
                    if (!e.p || !e.n) continue;
                    
                    const entryPath = normalizePath(e.p);
                    
                    if (entryPath === normalizedDir) continue;
                    
                    if (!entryPath.startsWith(normalizedDir + '/')) continue;
                    
                    const relativePath = entryPath.substring(normalizedDir.length + 1);
                    if (relativePath.includes('/')) continue;
                    
                    if (e.t === 'f' && isImageName(e.n)) {
                        const base = e.n.replace(/\.[^/.]+$/, '').toLowerCase();
                        images.set(base, entryPath);
                    }
                }
                
                for (const e of resp.entries) {
                    if (!e.p || !e.n) continue;
                    
                    const entryPath = normalizePath(e.p);
                    
                    if (entryPath === normalizedDir) continue;
                    
                    if (!entryPath.startsWith(normalizedDir + '/')) continue;
                    
                    const relativePath = entryPath.substring(normalizedDir.length + 1);
                    if (relativePath.includes('/')) continue;
                    
                    if (e.t === 'f' && (isBookName(e.n) || isAudioName(e.n) || isComicName(e.n))) {
                        const base = e.n.replace(/\.[^/.]+$/, '').toLowerCase();
                        const cover = images.has(base) ? images.get(base) : null;
                        files.push({ name: prettify(e.n), path: entryPath, sz: e.sz || 0, mt: e.mt || 0, cover });
                    } else if (e.t === 'd') {
                        const isComic = e.comic === true;
                        const base = e.n.toLowerCase();
                        const cover = images.has(base) ? images.get(base) : null;
                        files.push({ name: e.n, path: entryPath, isDir: true, isComic, cover });
                    }
                }
                files.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
                return { header: resp.header, files };
            } catch (err) {
                console.warn('loadDirContents failed', dir, err);
                return { header: null, files: [] };
            }
        }

                    card.addEventListener('click', async () => {

                    if (shouldAnimate) {

                    }

                    const fe = item.type === 'file' ? item.fileEntry : null;
                    if (fe) {
                        const resume = findResume({ path: fe.path, sz: fe.sz, mt: fe.mt });
                        if (resume && resume.entry) {
                            const e = resume.entry;
                            if (e.cfi || e.page || (e.time && e.duration)) {
                                updateResumeBadge({ path: fe.path }, e.percent ? e.percent : e.time);
                            }
                        }
                    }

                    frag.appendChild(card);
                });
            }

            if (useMixedMode && noImages.length > 0) {
                const noCoverSection = document.createElement('div');
                noCoverSection.className = 'no-cover-list';
                noCoverSection.style.gridColumn = '1 / -1';

                    row.dataset.path = pathVal;

                    if (item.type === 'dir') {
                        icon = item.isComic ? '📚' : '📁';
                    } else if (item.fileEntry) {
                        const name = item.fileEntry.name.toLowerCase();
                        if (name.endsWith('.mp3') || name.endsWith('.m4a') || name.endsWith('.m4b')) {
                            icon = '🎧';
                        } else if (name.endsWith('.cbz') || name.endsWith('.cbr')) {

                    }

                    const contextText = item.type === 'file' && item.fileEntry ? formatBytes(item.fileEntry.sz || 0) : '';

                    row.innerHTML = `
                        <span class="book-icon">${icon}</span>
                        <span class="title">${escapeHtml(item.name)}</span>
                        ${contextText ? `<span class="context">${contextText}</span>` : ''}
                    `;

                    row.addEventListener('click', async () => {
                        if (item.type === 'dir') {
                            if (item.isComic) {
                                window.location.href = `/comics.html?path=${encodeURIComponent(item.dir)}`;
                            } else {
                                await openListModal(item);

                        } else {
                            openActionModal(item.fileEntry);

                    if (shouldAnimate) {
                        row.style.animation = 'pop-in .36s cubic-bezier(.22,.9,.32,1) both';
                        row.style.animationDelay = Math.min(6000, animIdx * 55) + 'ms';
                        animIdx++;
                    }

                    noCoverSection.appendChild(row);

            gridEl.appendChild(frag);

        /* Action modal */
        function downloadFile(path, filename) {
            const a = document.createElement('a');
            a.href = path.startsWith('/') ? path : ('/' + path);
            a.download = filename || (path ? path.split('/').pop() : 'file');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
        /* Natural sort comparator for filenames */
        function naturalSortName(a, b) {
            const ax = String(a).split(/(\d+)/).map(s => (/\d+/.test(s) ? Number(s) : s.toLowerCase()));
            const bx = String(b).split(/(\d+)/).map(s => (/\d+/.test(s) ? Number(s) : s.toLowerCase()));
            for (let i = 0; i < Math.max(ax.length, bx.length); i++) {
                if (ax[i] === undefined) return -1;
                if (bx[i] === undefined) return 1;
                if (ax[i] === bx[i]) continue;
                return ax[i] < bx[i] ? -1 : 1;
            }
            return 0;
        }

        function openActionModal(file) {

                    setTimeout(() => {

                        nav.toc.forEach(chapter => {
                            const link = document.createElement('a');
                            link.className = 'toc-item';
                            link.textContent = chapter.label;
                            link.href = '#';
                            link.onclick = (e) => { e.preventDefault(); rendition.display(chapter.href); tocPanel.classList.remove('open'); };
                            tocContent.appendChild(link);
                            if (chapter.subitems) {
                                chapter.subitems.forEach(sub => {
                                    const subLink = document.createElement('a');
                                    subLink.className = 'toc-item toc-sub';
                                    subLink.textContent = sub.label;
                                    subLink.href = '#';
                                    subLink.onclick = (e) => { e.preventDefault(); rendition.display(sub.href); tocPanel.classList.remove('open'); };
                                    tocContent.appendChild(subLink);
                                });
                            }
                        });
                    } else {
                        tocContent.innerHTML = '<p style="padding:12px;color:var(--muted)">No table of contents available.</p>';
                    }
                });

                rendition.on('relocated', (location) => {
                    const percent = book.locations.percentageFromCfi(location.start.cfi);
                    progressInfo.textContent = Math.round(percent * 100) + '%';
                    const store = readResume();
                    const key = fileKey(file.path, file.sz, file.mt);
                    store[key] = { cfi: location.start.cfi, percent: Math.round(percent * 100), time: Date.now() };
                    writeResume(store);
                    updateResumeBadge(file, Math.round(percent * 100));
                });

                prevBtn.onclick = () => rendition.prev();
                nextBtn.onclick = () => rendition.next();

                rendition.on('keyup', (e) => {
                    if (e.key === 'ArrowLeft') rendition.prev();
                    else if (e.key === 'ArrowRight') rendition.next();
                });

            } catch (err) {
                console.error('EPUB load error', err);
                epubViewer.innerHTML = '<p style="padding:20px;text-align:center;color:red">Failed to load EPUB.</p>';
            }
        }

        closeReaderBtn.addEventListener('click', () => {
            readerContainer.classList.remove('active');
            if (rendition) { rendition.destroy(); rendition = null; }
            epubViewer.innerHTML = '';
            currentBook = null;
        });

        tocBtn.addEventListener('click', () => tocPanel.classList.toggle('open'));
        closeToc.addEventListener('click', () => tocPanel.classList.remove('open'));

        fontUpBtn.addEventListener('click', () => {
            epubFontSize = Math.min(200, epubFontSize + 10);
            if (rendition) rendition.themes.fontSize(`${epubFontSize}%`);
            localStorage.setItem('nomad_epub_font_pct', epubFontSize);
        });

        fontDownBtn.addEventListener('click', () => {
            epubFontSize = Math.max(80, epubFontSize - 10);
            if (rendition) rendition.themes.fontSize(`${epubFontSize}%`);
            localStorage.setItem('nomad_epub_font_pct', epubFontSize);
        });

        viewModeBtn.addEventListener('click', () => {
            epubFlow = epubFlow === 'paginated' ? 'scrolled-doc' : 'paginated';
            localStorage.setItem('nomad_epub_flow', epubFlow);
            viewModeBtn.textContent = epubFlow === 'paginated' ? 'Pages' : 'Scroll';
            if (currentBook) openEpubReader(currentBook);
        });
        viewModeBtn.textContent = epubFlow === 'paginated' ? 'Pages' : 'Scroll';

        /* comics open in comics.html, which streams pages instead of loading the whole archive here */
        async function openComicReader(file) {
            window.location.href = `comics.html?path=${encodeURIComponent(file.path)}`;
        }

        /* Audio Player */
        let currentAudio = null;
        let speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
        let speedIndex = 2;

        function openAudioPlayer(file) {
            currentAudio = file;
            audioTitle.textContent = file.name || 'Audiobook';
            audioElement.pause();
            audioElement.src = fileUrlDirect(file.path);
            try { audioElement.load(); } catch(e){}
            audioPlayer.classList.add('active');
            updateAudioHeight();

            const resume = findResume(file);
            if (resume && resume.entry && resume.entry.time) {
                audioElement.currentTime = resume.entry.time;
            }

            audioElement.play();
            playPauseBtn.textContent = '⏸';
        }

        document.getElementById('closeAudio').addEventListener('click', () => {
            audioPlayer.classList.remove('active');
            audioElement.pause();
            audioElement.src = '';
            currentAudio = null;
            updateAudioHeight();
        });

        playPauseBtn.addEventListener('click', () => {
            if (audioElement.paused) {
                audioElement.play();
                playPauseBtn.textContent = '⏸';
            } else {
                audioElement.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        document.getElementById('rewind').addEventListener('click', () => {
            audioElement.currentTime = Math.max(0, audioElement.currentTime - 15);
        });

        document.getElementById('forward').addEventListener('click', () => {
            audioElement.currentTime = Math.min(audioElement.duration, audioElement.currentTime + 15);
        });

        speedBtn.addEventListener('click', () => {
            speedIndex = (speedIndex + 1) % speeds.length;
            audioElement.playbackRate = speeds[speedIndex];
            speedBtn.textContent = speeds[speedIndex] + 'x';
        });

        audioElement.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audioElement.duration);
        });

        audioElement.addEventListener('timeupdate', () => {
            currentTimeEl.textContent = formatTime(audioElement.currentTime);
            const percent = (audioElement.currentTime / audioElement.duration) * 100;
            audioProgressFill.style.width = percent + '%';

            if (currentAudio && audioElement.duration > 0) {
                const store = readResume();
                const key = fileKey(currentAudio.path, currentAudio.sz, currentAudio.mt);
                store[key] = {
                    time: audioElement.currentTime,
                    duration: audioElement.duration,
                    percent: Math.round(percent),
                    timestamp: Date.now()
                };
                writeResume(store);
                updateResumeBadge(currentAudio, audioElement.currentTime);
            }
        });

        audioProgressBar.addEventListener('click', (e) => {
            const rect = audioProgressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = percent * audioElement.duration;
        });

        /* Init */
        (async function init() {
            try {
                library = await buildLibrary();
                filtered = library;
                renderGrid();
            } catch (err) {
                console.error('Failed to load library', err);
                gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:red;padding:20px">Failed to load library.</p>';
            }
        })();
    </script>
</body>
</html>
