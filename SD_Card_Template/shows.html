<!DOCTYPE html>
<!-- Version 4.1 -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Nomad • Shows</title>
<link rel="stylesheet" href="assets/plyr.css" />
<link rel="stylesheet" href="/master.css">
<script src="/theme-boot.js"></script>
<script src="/nomad-utils.js"></script>
<script src="assets/plyr.min.js"></script>
<script src="/theme-manager.js"></script>
<style>
  /* Functional CSS: Shows-specific layout and Plyr.js customization */
  :root{
    --card-gap:1rem;
    --header-height:68px; /* fallback used by CSS; JS will set exact top */
  }
  html,body{height:100%}
  body{display:flex;flex-direction:column;min-height:100vh}
  header{position:sticky;top:0;z-index:60;}

  .toolbar{
    padding:.65rem 1rem;
    display:flex;
    flex-wrap:wrap;
    gap:.6rem;
    align-items:center;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:var(--header-height);
    z-index:55;
    background:var(--bg);
  }
  .toolbar input[type="search"]{flex:1 1 220px;padding:.5rem .75rem;border:1px solid var(--line);border-radius:var(--radius);font-size:0.95rem;background:var(--card);color:var(--text)}
  .toolbar select, .toolbar .view-btn{padding:.48rem .7rem;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:var(--radius);font-size:0.9rem;cursor:pointer}
  .view-btn.active{background:var(--primary);color:var(--color-white);border-color:var(--primary-dark);}

  main{flex:1;display:flex;flex-direction:column;max-width:1200px;width:100%;margin:0 auto;padding:1rem}
  .grid-wrapper{flex:1;overflow-y:auto;padding-bottom:12px}
  .media-grid{display:grid;gap:var(--card-gap);}
  .media-grid.small  {grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .media-grid.medium {grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
  .media-grid.large  {grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}

  @media (max-width:600px){
    .media-grid.small  {grid-template-columns:repeat(2,1fr);}
    .media-grid.medium {grid-template-columns:repeat(3,1fr);}
    .media-grid.large  {grid-template-columns:repeat(4,1fr);}
  }

  /* cards */
  .media-card{width:100%;max-width:220px;margin:0 auto;position:relative;will-change:transform,opacity;}
  .media-grid.small  .media-card{max-width:120px;}
  .media-grid.medium .media-card{max-width:160px;}
  .media-grid.large  .media-card{max-width:220px;}

  .thumb-wrapper{position:relative;display:flex;align-items:center;justify-content:center;background:var(--thumb-bg);color:var(--thumb-text);font-size:0.9rem;text-align:center;width:100%;aspect-ratio:2/3;overflow:hidden;}
  .fallback-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;text-align:center;font-weight:700;color:var(--thumb-title);pointer-events:none;padding:6px}
  .media-thumb{display:block;width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;z-index:1;opacity:0;transition:opacity .35s ease;}
  .badge-resume{position:absolute;left:50%;transform:translateX(-50%);bottom:8px;background:rgba(0,0,0,0.6);color:#fff;padding:6px 10px;border-radius:999px;font-weight:700;font-size:12px;z-index:4;display:block;min-width:40px;max-width:85%;overflow:hidden}
  .marquee{display:block;white-space:nowrap;overflow:hidden;position:relative;height:18px}
  .m-inner{display:inline-block;white-space:nowrap}
  .m-inner span{display:inline-block;padding-right:40px}

  .card-body{display:none}

  /* modals */
  .modal,.episode-modal,.video-modal{display:none;position:fixed;inset:0;background:var(--overlay-modal);justify-content:center;align-items:center;z-index:1000;padding:20px;}
  .modal-content,.episode-modal-content{background:var(--card-bg);color:var(--text);padding:18px;border-radius:var(--radius);text-align:center;width:94%;max-width:980px;box-shadow:var(--shadow-large);max-height:90vh;overflow:auto}
  .video-modal-content{
    background:var(--card-bg);
    color:var(--text);
    padding:14px;
    border-radius:var(--radius);
    width:100%;
    max-width:980px;
    box-shadow:var(--shadow-large);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }

  .modal button,.episode-modal button,.video-modal button{padding:10px 12px;font-size:0.98rem;border-radius:var(--radius);border:0;cursor:pointer}
  .modal button:not(.cancel):not(.secondary){background:var(--primary);color:var(--color-white);width:100%}
  .modal button.secondary{background:transparent;color:var(--primary);border:1px solid var(--primary);width:100%}
  .modal button.cancel{background:transparent;color:var(--text);border:1px solid var(--line);width:100%}
  /* action modal: even spacing between stacked buttons (like movies/books). scoped to #actionModal so the episode picker is untouched */
  #actionModal .modal-content{display:flex;flex-direction:column;gap:10px}
  #actionModal .modal-content h2{margin:0;font-size:1.15rem;font-weight:700}
  #actionSub{font-size:0.9rem;color:var(--muted)}
  /* episode picker's Resume/Close buttons live in .episode-modal, which the rules above
     never covered, so they were unreadable in dark. token colors flip on their own */
  .episode-modal button.secondary{background:transparent;color:var(--primary);border:1px solid var(--primary);width:100%;font-weight:700}
  .episode-modal button.cancel{background:var(--card);color:var(--text);border:1px solid var(--line);width:100%}
  .episode-list{max-height:60vh;overflow-y:auto;text-align:left;padding:6px}
  .episode-list .ep-row{display:flex;align-items:center;gap:6px;padding:6px;border-bottom:1px solid var(--line)}
  .episode-list .ep-row button{flex:1;background:var(--primary);border:0;color:var(--color-white);text-align:center;padding:8px;border-radius:var(--radius);cursor:pointer;font-weight:700;font-size:0.95rem}
  .season-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--primary);color:var(--color-white);border-radius:var(--radius);margin:6px 0;cursor:pointer;font-weight:700}
  .season-content{padding-left:6px;padding-right:6px;margin-bottom:6px}

  .video-container{ width:100%; display:flex;flex-direction:column;align-items:center;gap:8px; }
  .video-container video{ width:100%; border-radius:var(--radius); }
  .video-actions{ display:flex; width:100%; gap:10px; }
  .video-actions button{
    flex:1;
    padding:10px 14px;
    font-size:0.95rem;
    border:none;
    border-radius:var(--radius);
    cursor:pointer;
    background:var(--primary);
    color:var(--color-white);
    transition:filter .18s ease;
  }
  .video-actions button:hover{ filter:brightness(0.96); }
  .plyr {
    --plyr-color-main: var(--primary);
    --plyr-video-controls-background: var(--overlay-video);
    border-radius: var(--radius);
    width: 100%;
  }
  .plyr__video-wrapper {
    width: 100%;
  }
  .plyr--fullscreen {
    background: var(--color-black);
  }
  .plyr--fullscreen video {
    max-height: 100% !important;
    max-width: 100% !important;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  @media (max-width: 768px) {
    .plyr__volume {
      display: none !important;
    }
  }
  .video-title{font-weight:700;color:var(--color-white);margin:0; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%}
  body.dark .back-btn { background: var(--white-alpha-12); color: var(--color-white); }
  body.dark .view-btn.active { border-color: var(--primary); }
</style>
</head>
<body data-page="shows">
  <header>
    <h1>Shows</h1>
    <a class="back-btn" href="/menu">← Back to Menu</a>
  </header>

  <div class="toolbar" role="region" aria-label="toolbar">
    <input id="searchInput" type="search" placeholder="Search shows…" aria-label="Search shows">
    <select id="sortSelect" aria-label="Sort shows">
      <option value="nameAsc">A → Z</option>
      <option value="nameDesc">Z → A</option>
    </select>
    <button class="view-btn" data-size="small" title="Compact view" aria-pressed="false">🔳</button>
    <button class="view-btn active" data-size="medium" title="Comfort view" aria-pressed="true">🔲</button>
    <button class="view-btn" data-size="large" title="Gallery view" aria-pressed="false">⬜</button>
  </div>

  <main>
    <div class="grid-wrapper">
      <div id="grid" class="media-grid medium" aria-live="polite" aria-label="Show list"></div>
    </div>
  </main>

  <div id="episodeModal" class="episode-modal" role="dialog" aria-modal="true">
    <div class="episode-modal-content" role="document">
      <h2 id="episodeModalTitle">Select an episode</h2>
      <div id="episodeResumeBanner" style="display:none;margin-bottom:8px"></div>
      <div id="episodeList" class="episode-list"></div>
      <div style="margin-top:10px"><button id="episodeCloseBtn" class="cancel">Close</button></div>
    </div>
  </div>

  <div id="actionModal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content" role="document">
      <h2 id="actionTitle">Play / Download</h2>
      <div id="actionSub"></div>
      <button id="playButton">Play (from start)</button>
      <button id="downloadButton" class="cancel">Download</button>
      <button id="actionCloseBtn" class="cancel">Cancel</button>
    </div>
  </div>

  <div id="videoModal" class="video-modal" role="dialog" aria-modal="true">
    <div class="video-modal-content" role="document">
      <div id="videoTitle" class="video-title"></div>
      <div class="video-container">
        <video id="videoPlayer" controls playsinline aria-label="Video player"></video>
      </div>
      <div class="video-actions">
        <button id="videoCloseBtn">Close</button>
        <button id="videoNextBtn">Next</button>
      </div>
    </div>
  </div>

<script>
/* Basic setup */

const ROOT_PATH = '/Shows';
const INDEX_ENDPOINT = '/api/index';
const MEDIA_ENDPOINT = '/media';

/* shared resume store */
const RESUME_KEY = 'nomad:watch:v1';
const ANIM_KEY_BASE = 'nomad:shows:anim:v1';

const VIDEO_EXTS = ['.mp4','.mkv','.avi','.mov','.webm','.m4v'];
const IMAGE_EXTS = ['.jpg','.jpeg','.png','.webp','.avif'];
const SUB_EXTS = ['.srt','.vtt','.ass','.ssa','.sub'];

/* ---------------- THEME ---------------- */
const THEME_KEY = 'nomad_dark_mode';

function applyThemeFlag(dark){
  try {
    dark = !!dark;
    // class hook 
    document.body.classList.toggle('dark', dark);

    // update root CSS variables for broad styles
    const root = document.documentElement.style;
    if(dark){
      root.setProperty('--bg', '#0b1116');
      root.setProperty('--text', '#e6eef8');
      root.setProperty('--muted', '#9aa6b3');
    } else {
      root.setProperty('--bg', '#f4f4f9');
      root.setProperty('--text', '#333');
      root.setProperty('--muted', '#6b7280');
    }

    // Keep search readable 
    const searchEl = document.querySelector('.toolbar input[type="search"], #searchInput');
    if(searchEl){
      // keep highly readable for the menu UI
      if(dark){
        searchEl.style.background = '#071421';
        searchEl.style.color = '#eaf6ff';
        searchEl.style.borderColor = 'rgba(255,255,255,0.04)';
      } else {
        searchEl.style.background = '#fff';
        searchEl.style.color = '#000';
        searchEl.style.borderColor = '#d6d9e6';
      }
    }

    // Header and toolbar surfaces
    const header = document.querySelector('header');
    if(header) header.style.background = '';
    const toolbar = document.querySelector('.toolbar');
    if(toolbar){
      toolbar.style.background = dark ? '#0d1722' : 'var(--bg)';
      toolbar.style.borderBottomColor = dark ? 'rgba(255,255,255,0.04)' : '#e6e9ef';
    }

    // Cards / thumbs / fallback text
    document.querySelectorAll('.media-card').forEach(c => {
      c.style.background = dark ? '#071421' : '#fff';
      c.style.boxShadow = dark ? '0 8px 24px rgba(0,0,0,0.45)' : 'var(--shadow)';
    });
    document.querySelectorAll('.thumb-wrapper').forEach(t => {
      t.style.background = dark ? '#08121a' : '#efeff5';
    });
    document.querySelectorAll('.fallback-text').forEach(f => {
      f.style.color = dark ? '#eaf6ff' : '#06306f';
    });
    document.querySelectorAll('.media-thumb').forEach(img => {
      // subtle outline in light mode, none in dark
      img.style.outline = dark ? 'none' : '1px solid rgba(0,0,0,0.04)';
    });

    // Resume badges
    document.querySelectorAll('.badge-resume').forEach(b => {
      b.style.background = dark ? 'rgba(0,0,0,0.6)' : 'rgba(0,0,0,0.6)';
      b.style.color = '#fff';
    });

    // modal bg + text (action modal uses theme-token CSS now, so its excluded here)
    document.querySelectorAll('.episode-modal-content, .video-modal-content').forEach(el => {
      if(dark){
        el.style.background = '#071722';
        el.style.color = '#eaf6ff';
        el.style.border = '1px solid rgba(255,255,255,0.04)';
        el.style.boxShadow = '0 12px 44px rgba(0,0,0,0.5)';
      } else {
        el.style.background = '#fff';
        el.style.color = '#111';
        el.style.border = '0';
        el.style.boxShadow = '0 12px 44px rgba(0,0,0,0.12)';
      }
    });

    // Episode list and rows 
    document.querySelectorAll('.episode-list').forEach(el => {
      if(dark){
        el.style.background = '#071722';
        el.style.color = '#eaf6ff';
        el.style.borderRadius = '8px';
        el.style.border = '1px solid rgba(255,255,255,0.03)';
      } else {
        el.style.background = '';
        el.style.color = '';
        el.style.borderRadius = '';
        el.style.border = '';
      }
    });
    document.querySelectorAll('.episode-list .ep-row').forEach(r => {
      r.style.background = 'transparent';
      r.style.borderBottom = dark ? '1px solid rgba(255,255,255,0.04)' : '1px solid #f4f4f9';
    });
    document.querySelectorAll('.episode-list .ep-row button').forEach(b => {
      if(dark){
        b.style.background = '#06202b';
        b.style.color = '#eaf6ff';
        b.style.border = '1px solid rgba(255,255,255,0.04)';
      } else {
        b.style.background = 'var(--primary)';
        b.style.color = '#fff';
        b.style.border = '0';
      }
    });

    // cancel/secondary buttons are theme-token CSS now (works for dynamic buttons too), no JS pass needed

    // Video player and title
    const videoEl = document.getElementById('videoPlayer');
    if(videoEl){
      videoEl.style.background = dark ? '#000' : '#fff';
      videoEl.style.outline = dark ? 'none' : '1px solid rgba(0,0,0,0.06)';
    }
    const videoTitleEl = document.getElementById('videoTitle');
    if(videoTitleEl) videoTitleEl.style.color = dark ? '#fff' : 'var(--text, #111)';

    // Resume banner styling
    const resumeBanner = document.getElementById('episodeResumeBanner');
    if(resumeBanner){
      resumeBanner.style.background = dark ? 'transparent' : 'transparent';
      resumeBanner.style.color = dark ? '#eaf6ff' : '#111';
    }

  } catch(e){
    console.warn('applyThemeFlag error', e);
  }
}

// bootstrap from storage
try {
  const stored = localStorage.getItem(THEME_KEY);
  applyThemeFlag(stored === 'true');
} catch(e){
  applyThemeFlag(false);
}

// sync across tabs when menu toggles theme
window.addEventListener('storage', (ev) => {
  if(ev.key === THEME_KEY){
    applyThemeFlag(ev.newValue === 'true');
  }
});

// Re-apply theme when grid children are replaced/added (so newly created cards get inline styles)
(function attachGridObserver(){
  try {
    const gridNode = document.getElementById('grid');
    if(!gridNode) return;
    const obs = new MutationObserver(() => {
      applyThemeFlag(localStorage.getItem(THEME_KEY) === 'true');
    });
    obs.observe(gridNode, { childList: true, subtree: true });
  } catch(e){
    // ignore
  }
})();



/* State */
let shows = [];
let filtered = [];
let currentSize = localStorage.getItem('nomadShowsSize') || 'medium';
let currentShow = null;
let flattenedEpisodes = [];   // copy of show.episodes for currently open show
let pathIndexMap = {};        // normalized path -> index
let currentEpisode = null;
let currentEpisodeIndex = -1;
let autosaveTimer = null;
let rootSig = null;

/* Helpers */
function ext(name){ const i=name.lastIndexOf('.'); return i>=0? name.slice(i).toLowerCase() : ''; }
function isVideoName(n){ return VIDEO_EXTS.includes(ext(n)); }
function isImageName(n){ return IMAGE_EXTS.includes(ext(n)); }
function fileUrl(path){ const p = normalizePath(path); return isVideoName(p) ? `${MEDIA_ENDPOINT}?file=${encodeURIComponent(p)}` : encodeURI(p); }
function formatTime(sec){ if(!sec||!isFinite(sec)) return '0:00'; sec=Math.floor(sec); const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60; if(h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; return `${m}:${String(s).padStart(2,'0')}`; }
function prettify(filename){ const n = filename.replace(/\.[^/.]+$/,''); let t = n.replace(/[_\.]+/g,' ').trim(); t = t.replace(/\s*\(?\d{4}\)?\s*$/,'').trim(); return t || filename; }

/* Resume store helpers (fileKey like movies) */
function readResume(){ try{ return JSON.parse(localStorage.getItem(RESUME_KEY)||'{}'); }catch(e){ return {}; } }
function writeResume(v){ try{ localStorage.setItem(RESUME_KEY, JSON.stringify(v)); }catch(e){ /* ignore */ } }
function fileKey(path, sz=0, mt=0){ return `${normalizePath(path)}|${sz||0}|${mt||0}`; }

/* Save a single resume entry */
function saveResumeEntryByKey(key, entry, purgeOtherNonCompleted = true){
  try{
    const store = readResume();

    if(store[key] && store[key].completed) return;

    if(purgeOtherNonCompleted){
      const pathOnly = (key.split('|')[0] || '');
      const showDir = findShowDirForEpisodePath(pathOnly);
      if(showDir){
        const normShow = normalizePath(showDir);
        for(const k of Object.keys(store)){
          const p = (k.split('|')[0] || '');
          if(!p) continue;
          const normP = normalizePath(p);
          // skip the current key
          if(k === key) continue;
          // if entry is under the same show dir and is not completed, remove it
          if(normP === normShow || normP.startsWith(normShow + '/')){
            if(store[k] && store[k].completed) continue;
            delete store[k];
          }
        }
      }
    }

    // set the new/updated entry and persist
    store[key] = entry;
    writeResume(store);
  }catch(e){
    console.warn('saveResumeEntryByKey failed', e);
  }
}

/* Capped: while a reindex runs the firmware 503s every media request device-wide,
   so an uncapped reindex -> retry -> reindex loop takes down playback on every
   page (not just this one) until reboot. One attempt per page load. */
const MAX_REINDEX_ATTEMPTS = 1;
let reindexAttempts = 0;

async function loadLibrary(){
  try {
    const { header, entries } = await fetchIndex(ROOT_PATH);
    if(!header || !header.sig){
      console.warn('No index signature found. Index may be building or missing.');

      if(reindexAttempts < MAX_REINDEX_ATTEMPTS){
        reindexAttempts++;
        try {
          const reindexRes = await fetch('/api/reindex', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `path=${encodeURIComponent(ROOT_PATH)}`
          });

          if (reindexRes.ok) {
            console.log('Reindex triggered successfully');
            gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Building index... Please wait.</p>';

            setTimeout(async () => {
              try {
                await loadLibrary();
              } catch(e) {
                console.error('Retry loadLibrary failed', e);
                gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Could not load library.</p>';
              }
            }, 3000);
            return;
          } else {
            console.error('Failed to trigger reindex:', reindexRes.status);
          }
        } catch(reindexErr) {
          console.error('Error triggering reindex:', reindexErr);
        }
      } else {
        console.warn('Reindex already attempted this session; not retrying.');
      }

      gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Index missing. Please try refreshing the page.</p>';
      return;
    }

    rootSig = header.sig;
    const data = [header, ...entries];
    shows = buildShowsFromIndexes(data, ROOT_PATH);
    applyFilter(searchInput.value);
    applySort(sortSelect.value);
    renderGrid();
    checkIndex();
  } catch(err){
    if(err && err.message === 'INDEX_BUILDING') {
      // Show loading message and retry after delay
      gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Building shows index, please wait...</p>';
      setTimeout(() => loadLibrary(), 3000); // Retry in 3 seconds
      return;
    }
    console.error('loadLibrary failed', err);
    gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">Could not load library.</p>';
  }
}

/* tolerant matching for resume (exact fileKey -> path-only -> basename) */
function findResumeForPath(episodeOrPath){
  const store = readResume();
  const norm = normalizePath(typeof episodeOrPath === 'string' ? episodeOrPath : (episodeOrPath.path || ''));
  const size = episodeOrPath && episodeOrPath.sz ? (episodeOrPath.sz) : 0;
  const mt = episodeOrPath && episodeOrPath.mt ? (episodeOrPath.mt) : 0;
  const exact = fileKey(norm, size, mt);
  if(store[exact]) return { key: exact, entry: store[exact] };

  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm) return { key: k, entry: store[k] };
  }
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').replace(/^\//,'');
    if(p === norm.replace(/^\//,'')) return { key: k, entry: store[k] };
  }
  const base = norm.split('/').pop().toLowerCase();
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '').toLowerCase();
    if(p.split('/').pop() === base) return { key: k, entry: store[k] };
  }
  return null;
}
// --- Helpers to update a single show's badge without re-rendering the whole grid ---
// Stops poster flashing bug
function findShowDirForEpisodePath(path){
  if(!path) return null;
  const norm = normalizePath(path);
  for(const s of shows){
    if(!s || !s.dir) continue;
    const sd = normalizePath(s.dir);
    // match if episode path starts with show dir (add trailing slash to avoid partial matches)
    if(norm === sd || norm.startsWith(sd + '/')) return sd;
  }
  return null;
}

function updateShowBadge(showDir){
  try {
    if(!showDir) return;
    const normDir = normalizePath(showDir);
    // find the card element for this show
    const card = Array.from(gridEl.querySelectorAll('.media-card')).find(c => normalizePath(c.dataset.dir || '') === normDir);
    if(!card) return;

    // find thumb wrapper
    const thumb = card.querySelector('.thumb-wrapper');
    if(!thumb) return;

    // remove existing marquee/resume badges 
    const existing = thumb.querySelectorAll('.badge-resume, .marquee');
    existing.forEach(n => n.remove());

    // find the show object
    const show = shows.find(s => normalizePath(s.dir) === normDir);
    if(!show) return;

    // If fully completed, show Completed marquee
    if(show._loaded && isShowFullyCompleted(show)){
      thumb.appendChild(createMarqueeElement('Completed'));
      return;
    }

    // Otherwise show most recent resume if available
    const showResume = findResumeForShowDir(show.dir);
    if(showResume && showResume.entry && !showResume.entry.completed && (showResume.entry.position && showResume.entry.position > 0)){
      const label = (showResume.entry.title && showResume.entry.title.length) ? showResume.entry.title : (showResume.path || '').split('/').pop();
      const txt = `${label} • ${formatTime(showResume.entry.position)}`;
      thumb.appendChild(createMarqueeElement(txt));
    }
  } catch(e){
    console.warn('updateShowBadge failed', e);
  }
}

/* find most recent resume entry under a show dir (for badge); returns latest entry under that dir */
function findResumeForShowDir(showDir){
  const store = readResume();
  const normShow = normalizePath(showDir || '');
  let best = null;
  for(const [k,v] of Object.entries(store)){
    const p = (k.split('|')[0] || '');
    if(!p) continue;
    const normP = normalizePath(p);
    if(normP === normShow || normP.startsWith(normShow + '/')){
      if(!best || (v.updated || 0) > (best.entry.updated || 0)){
        best = { key: k, entry: v, path: normP };
      }
    }
  }
  return best;
}
function clearResumeForPath(path){
  const store = readResume();
  const norm = normalizePath(path);
  let changed = false;
  for(const k of Object.keys(store)){
    const p = (k.split('|')[0] || '');
    if(normalizePath(p) === norm || p.replace(/^\//,'') === norm.replace(/^\//,'')){
      delete store[k];
      changed = true;
    }
  }
  if(changed) writeResume(store);
}

/* check if a show is fully completed (only if episodes are loaded) */
function isShowFullyCompleted(show){
  if(!show || !show._loaded || !Array.isArray(show.episodes) || show.episodes.length === 0) return false;
  const store = readResume();
  for(const ep of show.episodes){
    const key = fileKey(ep.path, ep.sz||0, ep.mt||0);
    if(!store[key] || !store[key].completed) return false;
  }
  return true;
}

/* fetch NDJSON index */
async function fetchIndex(path){
  const url = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}&_=${Date.now()}`;
  const res = await fetch(url, { cache: 'no-store' });

  if(res.status === 202) {
    // Server is building index - throw a specific error that can be caught
    throw new Error('INDEX_BUILDING');
  }

  if(!res.ok) throw new Error('index fetch failed '+res.status);
  const text = await res.text();

  // split into lines (handle CRLF), ignore blank lines
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

  // parse each line to JSON
  const parsed = [];
  for(const ln of lines){
    try {
      parsed.push(JSON.parse(ln));
    } catch(e){
      // keep parsing others and warn in console
      console.warn('index parse failed for line:', ln);
    }
  }
  let header = null;
  let entries = [];

  if(parsed.length > 0 && parsed[0] && typeof parsed[0] === 'object' && parsed[0].sig){
    header = parsed[0];
    entries = parsed.slice(1);
  } else {
    entries = parsed;
  }

  return { header, entries };
}


/* Build shows list */
function buildShowsFromIndexes(data, root = '/Shows'){
  const out = [];
  const rootImages = new Map();
  const entries = data.slice(1); // Skip the root dir entry

  // Pre-process to group entries by their parent directory
  const dirChildren = new Map();
  for(const e of entries){
    const parentPath = normalizePath(e.p.substring(0, e.p.lastIndexOf('/')));
    if(!dirChildren.has(parentPath)) dirChildren.set(parentPath, []);
    dirChildren.get(parentPath).push(e);
  }

  // Function to recursively build entries for a directory

  // Function to recursively build entries for a directory
  function getEntriesForDir(dirPath){
    const children = (dirChildren.get(dirPath) || []).map(c => Object.assign({}, c));
    for(const child of children){
      if(child.t === 'd'){
        child.entries = getEntriesForDir(normalizePath(child.p));
      }
    }
    return children;
  }

  // Find top-level show directories and build their nested entries
  const showDirs = entries.filter(e => {
    if (e.t !== 'd') return false;
    const parentPath = normalizePath(e.p.substring(0, e.p.lastIndexOf('/')));
    return parentPath.toLowerCase() === root.toLowerCase();
  });

  for(const e of showDirs){
    e.entries = getEntriesForDir(normalizePath(e.p));
  }

  // Pre-scan for root-level images that might be show covers
  entries.forEach(e => {
    if(e.t === 'f' && isImageName(e.n)){
      const parentPath = normalizePath(e.p.substring(0, e.p.lastIndexOf('/')));
      if(parentPath.toLowerCase() === root.toLowerCase()){
        const name = e.n.split('.').slice(0,-1).join('.').toLowerCase();
        if(!rootImages.has(name)) rootImages.set(name, normalizePath(e.p));
      }
    }
  });

  for(const e of showDirs){
    const seriesName = e.n;
    const seriesDir = normalizePath(e.p);

    let cover = null;

    if (e.entries) {
        const coverEntry = e.entries.find(item => item.t === 'f' && isImageName(item.n) && ['poster','cover','folder','art'].some(cs => item.n.toLowerCase().includes(cs)));
        if (coverEntry) {
            cover = normalizePath(coverEntry.p);
        }
    }

    if (!cover) {
        const candidates = [ seriesName.toLowerCase(), seriesName.toLowerCase().replace(/\s+/g,'-'), seriesName.toLowerCase().replace(/\s+/g,'_') ];
        for(const c of candidates) if(rootImages.has(c)) { cover = rootImages.get(c); break; }
        if(!cover){
          ['poster','cover','folder','art'].forEach(k => { if(!cover && rootImages.has(k)) cover = rootImages.get(k); });
        }
    }

    out.push({
        name: seriesName.replace(/[_\.]+/g,' ').trim(),
        dir: seriesDir,
        cover: cover || null,
        _loaded: false, 
        entries: e.entries || [],
        episodes: null
    });
  }
  out.sort((a,b)=> a.name.localeCompare(b.name));
  return out;
}

/* load series episodes from pre-loaded nested data */
function loadSeriesEpisodes(show){
  if(!show || !show.dir) return;
  if(show.episodes) return; // Already processed

  try {
    const entries = [];
    const showEntries = show.entries || [];

    // Sidecar subtitles: collect per directory, matched to an episode when the
    // subtitle's basename starts with the episode file's basename
    // (Ep1.srt / Ep1.en.srt next to Ep1.mp4).
    const isSubName = (n) => SUB_EXTS.includes(ext(n));
    const subsInDir = new Map();
    const addSub = (n, p) => {
      const full = normalizePath(p);
      const dir = full.replace(/\/[^/]+$/, '');
      if(!subsInDir.has(dir)) subsInDir.set(dir, []);
      subsInDir.get(dir).push({ n, p: full });
    };
    const subsFor = (videoPath, rawName) => {
      const dir = normalizePath(videoPath).replace(/\/[^/]+$/, '');
      const base = String(rawName).replace(/\.[^.]+$/, '').toLowerCase();
      return (subsInDir.get(dir) || [])
        .filter(s => s.n.replace(/\.[^.]+$/, '').toLowerCase().startsWith(base))
        .map(s => s.p);
    };

    // Process all entries in the show
    for(const e of showEntries){
      if(e.t === 'f' && isVideoName(e.n)) {
        // This is a video file directly in the show directory
        entries.push({ type:'f', name: prettify(e.n), raw: e.n, path: normalizePath(e.p), sz: e.sz||0, mt: e.mt||0 });
      } else if(e.t === 'f' && isSubName(e.n)) {
        addSub(e.n, e.p);
      } else if(e.t === 'd') {
        // This is a directory (season folder)
        const seasonPath = normalizePath(e.p);
        const children = [];

        // Look for video files in this season directory
        if(e.entries) {
          for(const se of e.entries) {
            if(se.t === 'f' && isVideoName(se.n)) {
              children.push({ name: prettify(se.n), raw: se.n, path: normalizePath(se.p), sz: se.sz||0, mt: se.mt||0 });
            } else if(se.t === 'f' && isSubName(se.n)) {
              addSub(se.n, se.p);
            }
          }
        }

        children.sort((a,b) => a.name.localeCompare(b.name));

        // Add the season directory with its episodes
        entries.push({ type:'d', name: e.n, path: seasonPath, children });
      }
    }

    // Sort entries alphabetically
    entries.sort((A,B) => String(A.name || '').toLowerCase().localeCompare(String(B.name || '').toLowerCase()));

    // Create flattened episode list
    const flat = [];
    let idx = 0;
    const map = {};

    for(const en of entries){
      if(en.type === 'f'){
        const item = { name: en.name, path: en.path, season: null, sz: en.sz||0, mt: en.mt||0, _seq: idx+1,
                       subtitles: subsFor(en.path, en.raw || en.name) };
        flat.push(item);
        map[normalizePath(item.path)] = idx;
        idx++;
      } else if(en.type === 'd'){
        for(const c of en.children){
          const item = { name: c.name, path: c.path, season: en.name, sz: c.sz||0, mt:c.mt||0, _seq: idx+1,
                         subtitles: subsFor(c.path, c.raw || c.name) };
          flat.push(item);
          map[normalizePath(item.path)] = idx;
          idx++;
        }
      }
    }

    show.entries = entries;
    show.episodes = flat.slice();
    show._loaded = true;
  } catch(err){
    console.warn('loadSeriesEpisodes failed', show.dir, err);
    show.entries = [];
    show.episodes = [];
    show._loaded = true;
  }
}

/* ensure flattened for current show */
function ensureFlattenedForCurrentShow(){
  if(!currentShow) return;
  if(!currentShow._loaded) loadSeriesEpisodes(currentShow);
  if(currentShow.episodes && currentShow.episodes.length){
    flattenedEpisodes = currentShow.episodes.map(e => Object.assign({}, e));
    pathIndexMap = {};
    flattenedEpisodes.forEach((it,i)=>{ pathIndexMap[normalizePath(it.path)] = i; });
    console.debug('[Shows] flattened ready', flattenedEpisodes.length);
  } else {
    flattenedEpisodes = [];
    pathIndexMap = {};
  }
}

/* Render grid */
function renderGrid(){
  gridEl.className = `media-grid ${currentSize}`;

  if(filtered.length === 0){ gridEl.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--primary-dark);">No shows found.</p>'; return; }
  for(const show of filtered){
    const card = document.createElement('div'); card.className='media-card';
    // helpful hook for single-card updates:
    try { card.dataset.dir = normalizePath(show.dir || ''); } catch(e){ card.dataset.dir = show.dir || ''; }

    const thumb = document.createElement('div'); thumb.className='thumb-wrapper';
    const fallback = document.createElement('span'); fallback.className='fallback-text'; fallback.textContent = show.name;
    thumb.appendChild(fallback);

    // If all episodes are completed, show only "Completed"
    if(show._loaded && isShowFullyCompleted(show)){
      thumb.appendChild(createMarqueeElement('Completed'));
    } else {
      // otherwise show most recent resume info if any
      const showResume = findResumeForShowDir(show.dir);
      if(showResume && showResume.entry && !showResume.entry.completed && (showResume.entry.position && showResume.entry.position > 0)){
        const label = (showResume.entry.title && showResume.entry.title.length) ? showResume.entry.title : (showResume.path || '').split('/').pop();
        const txt = `${label} • ${formatTime(showResume.entry.position)}`;
        thumb.appendChild(createMarqueeElement(txt));
      }
    }

    if(show.cover){
      const img = document.createElement('img'); img.className='media-thumb'; img.loading='lazy'; img.alt = show.name; img.src = show.cover;
      img.onload = ()=>{ img.style.opacity='1'; if(fallback) fallback.style.display='none'; };
      img.onerror = ()=>{ img.style.display='none'; if(fallback) fallback.style.display='block'; };
      thumb.appendChild(img);
    }
    card.appendChild(thumb);
    card.addEventListener('click', ()=> openEpisodeModal(show));
    frag.appendChild(card);
  }
  gridEl.innerHTML = '';
  gridEl.appendChild(frag);

  const animKey = rootSig ? `${ANIM_KEY_BASE}:${rootSig}` : ANIM_KEY_BASE;
  if(!localStorage.getItem(animKey) && filtered.length>0) runStaggeredAnimation(animKey);
}

/* stagger animation */
function runStaggeredAnimation(storeKey){
  const cards = Array.from(gridEl.querySelectorAll('.media-card'));
  if(!cards.length){ try{ localStorage.setItem(storeKey, Date.now()); }catch(e){}; return; }
  requestAnimationFrame(()=>{
    const gap = parseFloat(getComputedStyle(gridEl).gap) || 16;
    const gridW = Math.max(1, gridEl.clientWidth);
    const rect = cards[0].getBoundingClientRect();
    const cardW = Math.max(1, rect.width);
    const cols = Math.max(1, Math.floor((gridW + gap) / (cardW + gap)));
    const stagger = 45;
    cards.forEach((c,i)=>{ const row = Math.floor(i/cols), col=i%cols; c.style.animationDelay = `${(row*cols + col)*stagger}ms`; c.classList.add('play-anim'); });
    try{ localStorage.setItem(storeKey, Date.now()); }catch(e){}
    setTimeout(()=>{ cards.forEach(c=>{ c.style.animationDelay=''; c.classList.remove('play-anim'); }); }, (Math.ceil(cards.length/cols)*cols*stagger)+500);
  });
}

  if(!show._loaded) loadSeriesEpisodes(show);

  // If the whole show is completed (and we've loaded episodes) show single "Completed"
  if(show._loaded && isShowFullyCompleted(show)){

    btn.setAttribute('aria-disabled', 'true');
    btn.setAttribute('title', 'Show completed');

    episodeResumeBanner.appendChild(txt);
    episodeResumeBanner.appendChild(btn);
  } else {
    const showResume = findResumeForShowDir(show.dir);
    if(showResume && showResume.entry && !showResume.entry.completed && (showResume.entry.position && showResume.entry.position > 0)){
      episodeResumeBanner.style.display = 'block';
      episodeResumeBanner.innerHTML = '';

      const titleText = showResume.entry.title || showResume.path.split('/').pop();
      const positionText = formatTime(showResume.entry.position || 0);

      const txt = document.createElement('div');
      txt.textContent = `${titleText} • ${positionText}`;
      txt.style.marginBottom = '6px';

      const btn = document.createElement('button');
      btn.className = 'secondary';
      // Keep the label reasonably short but informative
      const shortTitle = (titleText.length > 48) ? (titleText.slice(0, 45) + '…') : titleText;
      btn.textContent = `Resume: ${shortTitle} • ${positionText}`;

      btn.onclick = () => {
        // Try to find the episode index by exact path first, then by basename fallback.
        let idx = findIndexForPathOrBasename(showResume.path);
        if(idx === undefined || idx === null){
          // Try a basename-only match across flattenedEpisodes
          const base = (showResume.path || '').split('/').pop();
          idx = flattenedEpisodes.findIndex(e => {
            if(!e) return false;
            if(e.path === showResume.path) return true;
            const epBase = (e.path || '').split('/').pop();
            if(epBase === base) return true;
            // Some indexes may store relative paths; compare names as a last resort
            return (e.name && e.name === showResume.entry.title);
          });
          if(idx === -1) idx = undefined;
        }

        if(idx !== undefined && idx !== null){
          const ep = flattenedEpisodes[idx];
          if(ep){
            openActionModalForEpisode(ep);
            openVideo(fileUrl(ep.path), true, ep);
          } else {
            // Fallback to opening the raw resume path
            openVideo(fileUrl(showResume.path), true, { name: showResume.entry.title || base, path: showResume.path });
          }
        } else {
          // Final fallback: open the stored resume path directly
          openVideo(fileUrl(showResume.path), true, { name: showResume.entry.title || showResume.path.split('/').pop(), path: showResume.path });
        }

        closeEpisodeModal();
      };

      episodeResumeBanner.appendChild(txt);
      episodeResumeBanner.appendChild(btn);
    }
  }

  episodeList.innerHTML = '';
  const entries = show.entries || [];

      else {

          btn.onclick = ()=>{ ensureFlattenedForCurrentShow(); const idx = findIndexForPathOrBasename(child.path); const target = (idx !== undefined)? flattenedEpisodes[idx] : { name: child.name, path: child.path, season: en.name }; openActionModalForEpisode(target); };
          row.appendChild(btn); content.appendChild(row);
        });

      section.appendChild(toggle); section.appendChild(content); episodeList.appendChild(section);
    }
  });

  // Apply theme styling to the newly created episode buttons
  const isDark = localStorage.getItem(THEME_KEY) === 'true';
  applyThemeFlag(isDark);
}

/* download */
function startDownload(ep){
  if(!confirm(`Download "${ep.name}"?`)) return;
  const a = document.createElement('a');
  a.href = ep.path.startsWith('/') ? ep.path : ('/' + ep.path);
  a.download = ep.name || ep.file;
  document.body.appendChild(a);
  a.click();
  a.remove();
}

/* Player wiring & logic  */
let stallTimer=null, stallRetries=0;
let _meta=null, _pause=null, _seek=null, _ended=null;

function detachVideoListeners(){ if(_meta) videoPlayer.removeEventListener('loadedmetadata', _meta); if(_pause) videoPlayer.removeEventListener('pause', _pause); if(_seek) videoPlayer.removeEventListener('seeked', _seek); if(_ended) videoPlayer.removeEventListener('ended', _ended); _meta=_pause=_seek=_ended=null; }
function attachVideoListeners(){ detachVideoListeners(); _meta = ()=>{ videoPlayer.removeEventListener('loadedmetadata', _meta); startAutosave(); }; _pause = ()=>{ saveNow(); }; _seek = ()=>{ saveNow(); }; _ended = ()=>{ handleEpisodeEnded(); }; videoPlayer.addEventListener('loadedmetadata', _meta); videoPlayer.addEventListener('pause', _pause); videoPlayer.addEventListener('seeked', _seek); videoPlayer.addEventListener('ended', _ended); }

// Enhanced stall watcher with 30-second intervals and stronger recovery
function startStallWatcher(player, src) {
  clearTimeout(stallTimer);
  stallRetries = 0;
  
  let lastCurrentTime = 0;
  let lastTimeCheck = Date.now();
  let stallCheckInterval = null;
  let consecutiveStalls = 0;
  
  function cleanupStallWatcher() {
    clearTimeout(stallTimer);
    if (stallCheckInterval) {
      clearInterval(stallCheckInterval);
      stallCheckInterval = null;
    }
  }
  
  function isPlayerStalled() {
    if (player.paused || player.ended) return false;
    
    // Check if playback position hasn't advanced
    const currentTime = player.currentTime;
    const now = Date.now();
    const timeDiff = now - lastTimeCheck;
    
    // If more than 5 seconds have passed and currentTime hasn't changed
    if (timeDiff > 5000 && currentTime === lastCurrentTime) {
      return true;
    }
    
    // Check readyState - if trying to play but not ready
    if (!player.paused && player.readyState < HTMLMediaElement.HAVE_CURRENT_DATA) {
      return true;
    }
    
    // Check if buffered regions are empty or far behind current time
    if (player.buffered.length > 0) {
      const bufferedEnd = player.buffered.end(player.buffered.length - 1);
      if (currentTime > bufferedEnd + 30) {
        return true;
      }
    }
    
    return false;
  }
  
  function attemptRecovery() {
    console.warn(`[StallWatcher] Attempting recovery (retry ${stallRetries + 1})`);
    
    const currentTime = player.currentTime;
    stallRetries++;
    consecutiveStalls++;
    
    // Progressive recovery strategies
    if (consecutiveStalls === 1) {
      // First try: just reload and resume
      player.load();
      player.addEventListener('loadeddata', () => {
        player.currentTime = currentTime;
        player.play().catch(e => console.warn('Recovery play failed:', e));
      }, { once: true });
      
    } else if (consecutiveStalls === 2) {
      // Second try: force new request with cache busting
      const newSrc = `${src}${src.includes('?') ? '&' : '?'}_retry=${Date.now()}`;
      player.src = newSrc;
      player.load();
      player.addEventListener('loadeddata', () => {
        player.currentTime = currentTime;
        player.play().catch(e => console.warn('Recovery play failed:', e));
      }, { once: true });
      
    } else if (consecutiveStalls >= 3) {
      // Third+ try: full reset with different approach
      player.removeAttribute('src');
      setTimeout(() => {
        const newSrc = `${src}${src.includes('?') ? '&' : '?'}_reset=${Date.now()}&t=${Math.random()}`;
        player.src = newSrc;
        player.preload = 'auto';
        player.load();
        player.addEventListener('canplay', () => {
          player.currentTime = currentTime;
          player.play().catch(e => console.warn('Recovery play failed:', e));
        }, { once: true });
      }, 1000);
    }
  }
  
  function checkForStalls() {
    if (isPlayerStalled()) {
      console.warn('[StallWatcher] Stall detected');
      attemptRecovery();
    } else {
      // Reset consecutive stalls if playback is healthy
      if (consecutiveStalls > 0 && player.currentTime > lastCurrentTime) {
        console.log('[StallWatcher] Playback recovered');
        consecutiveStalls = 0;
      }
    }
    
    lastCurrentTime = player.currentTime;
    lastTimeCheck = Date.now();
  }
  
  // Start monitoring every 30 seconds
  stallCheckInterval = setInterval(checkForStalls, 30000);
  
  // Also check more frequently for the first few minutes
  let quickCheckCount = 0;
  const quickCheckInterval = setInterval(() => {
    quickCheckCount++;
    checkForStalls();
    
    // Stop quick checks after 2 minutes
    if (quickCheckCount >= 24) { // 24 * 5 seconds = 2 minutes
      clearInterval(quickCheckInterval);
    }
  }, 5000);
  
  // Listen for network state changes
  player.addEventListener('stalled', () => {
    console.warn('[StallWatcher] Stalled event fired');
    attemptRecovery();
  });
  
  player.addEventListener('waiting', () => {
    console.warn('[StallWatcher] Waiting event fired');
    // Don't immediately retry on waiting, but check if it persists
    setTimeout(() => {
      if (isPlayerStalled()) {
        attemptRecovery();
      }
    }, 10000);
  });
  
  player.addEventListener('error', (e) => {
    console.error('[StallWatcher] Player error:', e);
    attemptRecovery();
  });
  
  // Clean up on these events
  const cleanupEvents = ['ended', 'pause'];
  cleanupEvents.forEach(eventType => {
    player.addEventListener(eventType, cleanupStallWatcher, { once: true });
  });
  
  // Reset stalls counter on successful playing
  player.addEventListener('playing', () => {
    console.log('[StallWatcher] Playing - resetting counters');
    stallRetries = 0;
    consecutiveStalls = 0;
  });
  
  // Initial check after a short delay
  setTimeout(checkForStalls, 5000);
}
/* find index: exact path first -> basename fallback */
function findIndexForPathOrBasename(path){
  const norm = normalizePath(path);
  if(pathIndexMap && pathIndexMap[norm] !== undefined) return pathIndexMap[norm];
  const base = norm.split('/').pop().toLowerCase();
  for(let i=0;i<flattenedEpisodes.length;i++){
    const ebase = (flattenedEpisodes[i].path || '').split('/').pop().toLowerCase();
    if(ebase === base) return i;
  }
  return undefined;
}

/* openVideo uses fileKey resume matching and updates title to the current episode */
async function openVideo(src, useResume=false, ep=null){
  if(ep) currentEpisode = ep;
  if(!currentEpisode || !currentEpisode.path) { console.debug('[Shows] openVideo called without episode'); return; }

  ensureFlattenedForCurrentShow();
  const idx = findIndexForPathOrBasename(currentEpisode.path);
  if(idx !== undefined && idx !== null){ currentEpisodeIndex = idx; currentEpisode = Object.assign({}, flattenedEpisodes[idx]); }
  else { currentEpisodeIndex = -1; }

  console.debug('[Shows] openVideo', { path: currentEpisode.path, index: currentEpisodeIndex });

  console.log('[Shows openVideo] currentEpisode:', currentEpisode ? currentEpisode.path : 'NONE', 'useResume:', useResume);
  const saved = findResumeForPath(currentEpisode);
  console.log('[Shows openVideo] findResumeForPath result:', saved);
  let startTime = 0;
  if(useResume && saved && saved.entry && saved.entry.position > 1 && !saved.entry.completed){
    startTime = saved.entry.position;
  }
  console.log('[Shows openVideo] startTime will be:', startTime);

  videoPlayer.removeAttribute('src');
  videoPlayer.innerHTML = '';

  if (!window.plyrInstance) {
    window.plyrInstance = new Plyr(videoPlayer, {
      iconUrl: 'assets/plyr.svg',
      controls: [
        'play-large',
        'play',
        'progress',
        'current-time',
        'duration',
        'mute',
        'volume',
        'captions',
        'settings',
        'pip',
        'airplay',
        'fullscreen'
      ],
      settings: ['captions', 'speed'],
      fullscreen: { enabled: true, fallback: true, iosNative: false },
      clickToPlay: false,
      hideControls: true,
      resetOnEnd: false,
      keyboard: { focused: true, global: true },
      tooltips: { controls: true, seek: true }
    });

    try {
      const allImages = document.querySelectorAll('img[loading="lazy"]');
      allImages.forEach(img => {
        if (img.src && !img.complete) {
          img.dataset.originalSrc = img.src;
          img.removeAttribute('src');
        }
      });
      console.log('Paused lazy image loading for video playback');
    } catch(e) {
      console.warn('Could not pause image loading', e);
    }

    window.plyrInstance.on('ended', () => {
      handleEpisodeEnded();
    });

    window.plyrInstance.on('pause', () => {
      saveNow();
      releaseWakeLock().catch(()=>{});
    });

    window.plyrInstance.on('play', () => {
      requestWakeLock().catch(()=>{});
    });

    window.plyrInstance.on('seeked', () => {
      saveNow();
    });

    window.plyrInstance.on('enterfullscreen', async () => {
      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape').catch(e => console.log('Orientation lock not supported:', e));
        }
      } catch(e) {
        console.log('Could not lock orientation:', e);
      }
    });

    window.plyrInstance.on('exitfullscreen', () => {
      try {
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      } catch(e) {
        console.log('Could not unlock orientation:', e);
      }
    });

    setTimeout(() => {
      const plyrWrapper = document.querySelector('.plyr__video-wrapper');
      if (plyrWrapper) {
        let lastTap = 0;
        let tapTimeout = null;

        plyrWrapper.addEventListener('touchend', (e) => {
          const currentTime = Date.now();
          const tapLength = currentTime - lastTap;

          if (tapLength < 300 && tapLength > 0) {
            clearTimeout(tapTimeout);
            e.preventDefault();
            e.stopPropagation();

            const rect = plyrWrapper.getBoundingClientRect();
            const touchX = e.changedTouches[0].clientX - rect.left;
            const width = rect.width;

            if (touchX < width / 3) {
              window.plyrInstance.rewind(10);
              console.log('Rewind 10s');
            } else if (touchX > (2 * width) / 3) {
              window.plyrInstance.forward(10);
              console.log('Forward 10s');
            }
            lastTap = 0;
          } else {
            lastTap = currentTime;
            tapTimeout = setTimeout(() => {
              lastTap = 0;
              if (window.plyrInstance && document.querySelector('.plyr--hide-controls') === null) {
                const controlsDiv = document.querySelector('.plyr__controls');
                if (controlsDiv && getComputedStyle(controlsDiv).opacity !== '0') {
                  const video = document.querySelector('.plyr video');
                  if (video) video.click();
                }
              }
            }, 300);
          }
        });
      }
    }, 500);
  }

  videoPlayer.src = src;
  // all sidecar subtitles as selectable tracks; srt converted to VTT (browsers
  // render nothing for raw srt in <track>)
  const subTracks = await NomadSubs.buildTracks(
    (currentEpisode.subtitles || []).map(p => ({ path: p, url: fileUrl(p) })),
    currentEpisode.path);
  subTracks.forEach(sub => {
    const track = document.createElement('track');
    track.kind = sub.kind;
    track.label = sub.label;
    track.srclang = sub.srclang;
    track.src = sub.src;
    if(sub.default) track.default = true;
    videoPlayer.appendChild(track);
  });
  videoPlayer.load();

  videoModal.style.display = 'flex';
  videoTitle.textContent = currentEpisode.name || '';

  if (startTime > 0) {
    let seekDone = false;
    const doSeek = () => {
      if(seekDone) return;
      try {
        const vid = window.plyrInstance.media || videoPlayer;
        if(vid.readyState >= 1 && vid.duration > 0){
          seekDone = true;
          vid.currentTime = startTime;
          console.log('Resume position set to:', startTime);
        }
      } catch(e){ console.warn('Seek failed:', e); }
    };
    videoPlayer.addEventListener('canplay', doSeek, { once: true });
    videoPlayer.addEventListener('loadeddata', doSeek, { once: true });
    setTimeout(doSeek, 500);
    setTimeout(doSeek, 1500);
    setTimeout(doSeek, 3000);
  }

  startAutosave();

  const doPlay = () => {
    window.plyrInstance.play().catch(e => console.warn('Play failed:', e));
  };
  if(videoPlayer.readyState >= 3){
    doPlay();
  } else {
    videoPlayer.addEventListener('canplay', doPlay, { once: true });
  }
}

/* When an episode ends: mark episode completed and either auto-advance to the next episode
   (same behavior as clicking Next) OR, if there is no next episode, close the player/modal. */
function handleEpisodeEnded(){
  console.debug('[Shows] episode ended', currentEpisode && currentEpisode.path);
  if(currentEpisode && currentEpisode.path){
    try {
      const store = readResume();
      const key = fileKey(currentEpisode.path, currentEpisode.sz||0, currentEpisode.mt||0);
      const dur = window.plyrInstance ? Math.floor(window.plyrInstance.duration || 0) : 0;
      store[key] = { completed: true, position: 0, duration: dur, updated: Date.now(), title: currentEpisode.name || '' };
      writeResume(store);
    } catch(e){ console.warn('failed to mark completed', e); }
  }

  // Stop the periodic autosave
  stopAutosave();

  // Determine current index robustly
  let curIdx = currentEpisodeIndex;
  if((curIdx === undefined || curIdx === -1) && currentEpisode && currentEpisode.path) curIdx = findIndexForPathOrBasename(currentEpisode.path);
  if(curIdx === undefined || curIdx === null) {
    // no index info; just close everything
    closeVideo(false);
    closeEpisodeModal();
    renderGrid();
    return;
  }

  const nextIdx = curIdx + 1;
  if(Array.isArray(flattenedEpisodes) && nextIdx < flattenedEpisodes.length){
    // Auto-advance: reuse nextEpisode() logic so behavior is identical to manual Next button
    // Set currentEpisodeIndex correctly and call nextEpisode() which will update UI/resume.
    currentEpisodeIndex = curIdx; // ensure nextEpisode computes next from the right base
    try {
      nextEpisode();
    } catch(e){
      console.warn('auto next failed', e);
      // fallback: close if next failed
      closeVideo(false);
      closeEpisodeModal();
    }
    // update only the affected show's badge (nextEpisode will update the player)
    const sd = findShowDirForEpisodePath(currentEpisode && currentEpisode.path);
    if(sd) updateShowBadge(sd);

  } else {
    // No more episodes: close player and episode modal 
    closeVideo(false);
    closeEpisodeModal();
    const sd = findShowDirForEpisodePath(currentEpisode && currentEpisode.path);
    if(sd) updateShowBadge(sd);
  }
}

/* Next button (manual) - still allowed; moves to next ep if available */
async function nextEpisode(){
  console.debug('[Shows] nextEpisode called, currentIndex=', currentEpisodeIndex);
  if(!flattenedEpisodes || flattenedEpisodes.length === 0) return;
  let curIdx = currentEpisodeIndex;
  if(curIdx === -1 && currentEpisode && currentEpisode.path) curIdx = findIndexForPathOrBasename(currentEpisode.path);
  if(curIdx === undefined || curIdx === null) { closeVideo(true); return; }
  const nextIdx = curIdx + 1;
  if(nextIdx >= flattenedEpisodes.length){ closeVideo(true); return; }
  const next = flattenedEpisodes[nextIdx];
  console.debug('[Shows] nextEpisode ->', nextIdx, next.path);

  try {
    const key = fileKey(next.path, next.sz||0, next.mt||0);
    const entry = { position: 1, duration: next.sz || 0, updated: Date.now(), title: next.name || '' };
    saveResumeEntryByKey(key, entry, true);
  } catch(e){ console.warn('saving resume for next failed', e); }

  currentEpisodeIndex = nextIdx;
  currentEpisode = Object.assign({}, next);

  videoTitle.textContent = currentEpisode.name || '';

  const src = fileUrl(currentEpisode.path);
  const subtitles = await NomadSubs.buildTracks(
    (currentEpisode.subtitles || []).map(p => ({ path: p, url: fileUrl(p) })),
    currentEpisode.path);

  if(window.plyrInstance){
    window.plyrInstance.source = {
      type: 'video',
      sources: [{ src: src, type: 'video/mp4' }],
      tracks: subtitles
    };
    window.plyrInstance.play().catch(()=>{});
  }

  const sd = findShowDirForEpisodePath(currentEpisode && currentEpisode.path);
  if(sd) updateShowBadge(sd);
}

/* Autosave */
function startAutosave(){ stopAutosave(); autosaveTimer = setInterval(saveNow, 4000); }
function stopAutosave(){ if(autosaveTimer){ clearInterval(autosaveTimer); autosaveTimer = null; } }

function saveNow(){
  try {
    if(!currentEpisode || !currentEpisode.path) return;
    if(!window.plyrInstance) return;
    const cur = Math.floor(window.plyrInstance.currentTime || 0);
    const dur = Math.floor(window.plyrInstance.duration || 0);
    if(!isFinite(cur)) return;
    if(cur > 0 && dur > 0){
      const key = fileKey(currentEpisode.path, currentEpisode.sz || 0, currentEpisode.mt || 0);

      const store = readResume();
      const existing = store[key];
      if(existing && existing.completed) return;

      const entry = { position: cur, duration: dur, updated: Date.now(), title: currentEpisode.name || '' };

      saveResumeEntryByKey(key, entry, true);

      console.debug('[Shows] autosave', { key, pos: cur, dur });

      const showDir = findShowDirForEpisodePath(currentEpisode.path);
      if(showDir) updateShowBadge(showDir);

      if(episodeModal.style.display === 'flex' && currentShow && normalizePath(currentShow.dir) === showDir){
        const showResume = findResumeForShowDir(showDir);
        if(showResume && showResume.entry && !showResume.entry.completed && (showResume.entry.position && showResume.entry.position > 0)){
          episodeResumeBanner.style.display='block'; episodeResumeBanner.innerHTML = '';
          const txt = document.createElement('div'); txt.textContent = `${showResume.entry.title || showResume.path.split('/').pop()} • ${formatTime(showResume.entry.position || 0)}`; txt.style.marginBottom='6px';
          const btn = document.createElement('button'); btn.className='secondary';
          btn.textContent = `Resume: ${(showResume.entry.title || showResume.path.split('/').pop()).slice(0,48)} • ${formatTime(showResume.entry.position || 0)}`;
          btn.onclick = () => {
            const idx = findIndexForPathOrBasename(showResume.path);
            if(idx !== undefined && idx !== null){
              openActionModalForEpisode(flattenedEpisodes[idx]);
              openVideo(fileUrl(flattenedEpisodes[idx].path), true, flattenedEpisodes[idx]);
            } else {
              openVideo(fileUrl(showResume.path), true, { name: showResume.entry.title || showResume.path.split('/').pop(), path: showResume.path });
            }
            closeEpisodeModal();
          };
          episodeResumeBanner.appendChild(txt);
          episodeResumeBanner.appendChild(btn);
        } else {
          episodeResumeBanner.style.display='none'; episodeResumeBanner.innerHTML='';
        }
      }

    }
  } catch(e){ console.warn('saveNow failed', e); }
}

/* Index watcher + load library */
async function checkIndex(){
  try {
    const res = await fetch(`${INDEX_ENDPOINT}?path=${encodeURIComponent(ROOT_PATH)}`);
    if(!res.ok) return;
    const text = await res.text();
    const headerLine = text.split('\n')[0];
    if(headerLine){
      const header = JSON.parse(headerLine);
      if(header && header.sig && rootSig && rootSig !== header.sig) await loadLibrary();
      else if(header && header.sig && !rootSig) rootSig = header.sig;
    }
  } catch(e){}
}

/* Handle incoming hash like #open=%2FShows%2FShowName%2FS1%20E1.mp4
*/
async function handleHashOpenIfPresent(){
  try {
    if(!location.hash) return;
    const raw = location.hash.replace(/^#/,'');

    // parse hash key=value pairs (hash format used by menu.html)
    const params = {};
    raw.split('&').forEach(p => {
      const [k, v] = p.split('=');
      if(!k) return;
      try { params[k] = v === undefined ? '' : decodeURIComponent(v || ''); }
      catch(e) { params[k] = v === undefined ? '' : (v || ''); }
    });

    if(!params.open && !params.play) return;

    const openPath = normalizePath(params.open || params.play || '');
    const parts = openPath.split('/').filter(Boolean); // e.g. ['Shows','ShowName','Season1'] or ['Shows','ShowName','S01E01.mkv']

    // If the path is a show directory or season directory, open the episode modal instead of playing.
    // Handle both /Shows/ShowName (2 parts) and /Shows/ShowName/Season1 (3+ parts where last part is a directory)
    if(parts.length >= 2 && parts[0].toLowerCase() === 'shows'){
      // For paths like /Shows/ShowName or /Shows/ShowName/Season1, we want to open the show's episode modal
      const showDirCandidate = '/' + parts.slice(0,2).join('/'); // Always use first 2 parts for show directory

      // ensure library is loaded so we can find the show object
      if(!shows || !shows.length){
        try { await loadLibrary(); } catch(e){ /* ignore */ }
      }

      // find by normalized dir (case-insensitive)
      let show = shows.find(s => normalizePath(s.dir).toLowerCase() === showDirCandidate.toLowerCase());

      // fallback: try matching by show name if exact dir not found
      if(!show){
        const showNameCandidate = decodeURIComponent(parts[1]).replace(/[_\-\%]+/g,' ').toLowerCase();
        show = shows.find(s => (s.name || '').toLowerCase() === showNameCandidate);
      }

      if(show){
        // Check if this is likely a season directory (3+ parts and last part doesn't look like a video file)
        const isSeasonDir = parts.length >= 3 && !isVideoName(parts[parts.length - 1]);
        
        // If it's a season directory or just the show directory, open the episode modal
        if(parts.length === 2 || isSeasonDir){
          // load episodes, set currentShow and open modal (no playback)
          await loadSeriesEpisodes(show);
          currentShow = show;
          await ensureFlattenedForCurrentShow();
          openEpisodeModal(show);
          
          // Clear the hash so reloads don't re-open the modal
          history.replaceState(null, '', location.pathname + location.search);
          return;
        }
      }
    }

    // Otherwise treat open as an explicit episode/file request (existing behavior preserved)
    // Attempt to find the parent show (first two segments)
    if(parts.length < 3){
      // not enough info to identify an episode; clear hash and exit
      history.replaceState(null, '', location.pathname + location.search);
      return;
    }

    const showDir = '/' + parts.slice(0,2).join('/'); // /Shows/ShowName

    // ensure shows list is present
    if(!shows || !shows.length){
      try { await loadLibrary(); } catch(e){ /* ignore */ }
    }

    let showObj = shows.find(s => normalizePath(s.dir).toLowerCase() === showDir.toLowerCase());
    if(!showObj){
      const showNameCandidate = decodeURIComponent(parts[1]).replace(/[_\-\%]+/g,' ').toLowerCase();
      showObj = shows.find(s => (s.name||'').toLowerCase() === showNameCandidate);
    }

    if(!showObj){
      // can't find show; clear hash and stop
      history.replaceState(null, '', location.pathname + location.search);
      return;
    }

    // ensure episodes loaded for that show
    await loadSeriesEpisodes(showObj);
    currentShow = showObj;
    await ensureFlattenedForCurrentShow();

    // find the episode (exact path or fallback to basename match)
    const idx = findIndexForPathOrBasename(openPath);
    const ep = (idx !== undefined && idx !== null) ? flattenedEpisodes[idx] : null;

    // Preserve prior behavior: if a specific episode was requested, open it in the player (resume)
    if(ep){
      openVideo(fileUrl(ep.path), true, ep);
    } else {
      // If we didn't find a matching episode file, try to open the provided path directly in the player.
      openVideo(fileUrl(openPath), true, { name: openPath.split('/').pop(), path: openPath });
    }

    // Clear the hash so a reload doesn't auto-play again
    history.replaceState(null, '', location.pathname + location.search);

  } catch(err){
    console.warn('handleHashOpenIfPresent failed', err);
  }
}
// also respond to hash changes while on page
window.addEventListener('hashchange', ()=> handleHashOpenIfPresent());

/* Boot */
setViewSize(currentSize);
viewButtons.forEach(btn => btn.addEventListener('click', () => setViewSize(btn.dataset.size)));
searchInput.addEventListener('input', e => { clearTimeout(window.__debounce); window.__debounce = setTimeout(()=> applyFilter(e.target.value), 150); });
sortSelect.addEventListener('change', () => applySort(sortSelect.value));

(async function init(){
  try {
    await loadLibrary();

    // handle hash if present (resume/open)
    await handleHashOpenIfPresent();
  } catch(e){ console.error('init failed', e); }
  setInterval(checkIndex, 30000);
})();

/* admin toggle: hide the download action when downloads are disabled */
NomadUI.hideDownloads('downloadButton');
</script>

</body>
</html>
