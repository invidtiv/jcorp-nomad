<!DOCTYPE html>
<!-- Version 4 -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta name="description" content="Jcorp Nomad — Menu" />
<title>Jcorp Nomad</title>
<link rel="icon" href="/favicon.ico" />
<link rel="stylesheet" href="/master.css">
<script>
(async function() {
  try {
    const isDark = localStorage.getItem('nomad_dark_mode') === 'true';
    if (isDark) document.documentElement.classList.add('dark');

    async function loadThemeFromServer() {
      try {
        const response = await fetch('/.system-theme.json?t=' + Date.now());
        if (response.ok) {
          const theme = await response.json();
          localStorage.setItem('nomad_custom_theme', JSON.stringify(theme));
          return theme;
        }
      } catch (e) {
        console.log('[Menu] No theme on SD card, using localStorage');
      }
      return null;
    }

    const serverTheme = await loadThemeFromServer();
    const colors = serverTheme || (function() {
      const saved = localStorage.getItem('nomad_custom_theme');
      return saved ? JSON.parse(saved) : null;
    })();

    if (colors) {
      const style = document.createElement('style');
      style.id = 'custom-theme-style';
      style.textContent = `
        :root {
          --primary: ${colors.primary} !important;
          --primary-dark: ${colors.primaryDark} !important;
          --bg: ${colors.bgLight} !important;
          --card: ${colors.cardLight} !important;
          --card-bg: ${colors.cardLight} !important;
          --text: ${colors.textLight} !important;
          --muted: ${colors.mutedLight} !important;
        }
        body.dark {
          --bg: ${colors.bgDark} !important;
          --card: ${colors.cardDark} !important;
          --card-bg: ${colors.cardDark} !important;
          --text: ${colors.textDark} !important;
          --muted: ${colors.mutedDark} !important;
          --primary: ${colors.primaryDarkTheme} !important;
        }
      `;
      document.head.appendChild(style);
    }
  } catch(e) {
    console.error('[Menu] Theme loading error:', e);
  }
})();
</script>
<script src="/theme-manager.js"></script>
<script src="/nomad-utils.js"></script>
<style>
  /* Menu-specific functional CSS layout and search functionality */
  :root {
    --header-height:64px;
    --page-max:1400px;
  }

  html,body {
    height:100%;
    margin:0;
    -webkit-font-smoothing:antialiased;
  }
  body {
    display:flex;
    flex-direction:column;
  }

  /* full-page background layer to avoid mobile variable bleed / white gaps */
  .page-bg {
    position:fixed;
    inset:0;
    background:var(--bg);
    z-index:0;
    pointer-events:none;
    transition:background .18s linear;
  }

  /* Header */
  header {
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:space-between;
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    position:sticky;
    top:0;
    background:var(--primary);
    color:#fff;
    z-index:80;
    backdrop-filter:blur(6px);
    height:var(--header-height);
    box-sizing:border-box;
  }

  .brand {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:0;
  }

  .logo {
    display:flex;
    align-items:center;
    justify-content:center;
    padding:4px;
    height:48px;
    min-width:48px;
    border-radius:var(--radius);
    overflow:hidden;
    background:rgba(255,255,255,0.06);
    box-shadow:var(--shadow);
    flex-shrink:0;
  }

  .logo img {
    display:block;
    max-height:40px;
    max-width:180px;
    object-fit:contain;
    pointer-events:none;
    user-select:none;
  }

  .title {
    font-weight:800;
    font-size:1.06rem;
    line-height:1;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .header-space {
    display:flex;
    align-items:center;
    gap:8px;
    margin-left:auto;
  }

  .icon-btn {
    width:44px;
    height:44px;
    border-radius:11px;
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.06);
    display:inline-grid;
    place-items:center;
    cursor:pointer;
    color:#fff;
    transition:transform .12s, box-shadow .12s, opacity .12s;
    font-size:16px;
  }

  .icon-btn:active {
    transform:translateY(1px);
  }

  .admin-btn {
    width:38px;
    height:38px;
    border-radius:var(--radius);
    border:1px solid rgba(255,255,255,0.08);
    background:rgba(255,255,255,0.06);
    color:#fff;
    display:inline-grid;
    place-items:center;
    cursor:pointer;
  }

  /* Main layout */
  main {
    max-width:var(--page-max);
    margin:18px auto;
    padding:12px 20px;
    position:relative;
    display:flex;
    flex-direction:column;
    min-height:calc(100vh - var(--header-height) - 36px);
    box-sizing:border-box;
    z-index:1;
    align-items:center;
  }

  .content-area {
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    gap:12px;
    width:100%;
    align-items:center;
  }

  .welcome-center {
    text-align:center;
    margin-bottom:6px;
    width:100%;
  }

  .welcome-center h1 {
    margin:0;
    font-size:1.4rem;
    font-weight:900;
    letter-spacing:-0.3px;
    color:var(--text);
  }

  .welcome-center p {
    margin:6px 0 0;
    color:var(--muted);
    font-size:1rem;
  }

  /* Search row */
  .search-row {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    margin:8px 0 14px;
    justify-content:center;
    width:100%;
  }

  .search-input {
    width:100%;
    max-width:980px;
    padding:14px 16px;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:var(--card-bg);
    color:var(--text);
    font-weight:600;
    font-size:1rem;
    box-shadow:var(--shadow);
  }

  .search-input::placeholder {
    color:var(--muted);
  }

  /* loader under input for feedback */
  .search-loader {
    width:100%;
    max-width:980px;
    height:8px;
    border-radius:6px;
    overflow:hidden;
    background:linear-gradient(90deg, color-mix(in srgb, var(--primary) 10%, transparent), color-mix(in srgb, var(--primary) 5%, transparent));
    display:none;
  }

  .search-loader .bar {
    position:relative;
    left:-40%;
    width:36%;
    height:100%;
    background:linear-gradient(90deg, var(--primary), var(--primary-dark));
    animation:slide 1100ms linear infinite;
  }

  @keyframes slide {
    to {
      left:140%;
    }
  }

  /* tiles - use flex grid so partial bottom rows are centered */
  .grid-wrap {
    margin-top:8px;
    padding:14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:linear-gradient(180deg, transparent, rgba(0,0,0,0.01));
    width:100%;
    box-sizing:border-box;
  }

  .grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    max-width:760px;
    margin:12px auto 0;
    align-items:stretch;
  }

  @media (min-width:1100px) {
    .grid {
      max-width:1200px;
    }
  }

  @media (max-width:900px) {
    .tile {
      flex:0 0 calc(50% - 8px);
      max-width:360px;
    }
  }

  @media (max-width:480px) {
    .tile {
      flex:0 0 100%;
      max-width:none;
    }
  }

  .tile {
    background:var(--card-bg);
    border-radius:var(--radius);
    padding:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    border:1px solid var(--line);
    cursor:pointer;
    transition:transform .12s, box-shadow .12s;
    min-height:60px;
    color:var(--text);
    flex:0 0 calc(33.333% - 8px);
    max-width:none;
    box-sizing:border-box;
  }

  .tile:active {
    transform:translateY(1px);
  }

  .tile .label {
    font-size:1rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    padding:0 6px;
    text-align:center;
    width:100%;
  }

  /* search results panel */
  #resultsPanel {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:150px;
    width:min(1200px, calc(100% - 36px));
    z-index:220;
    display:none;
    background:var(--card-bg);
    border-radius:var(--radius);
    box-shadow:var(--shadow-large);
    border:1px solid var(--line);
    max-height:62vh;
    overflow:auto;
  }

  .result-row {
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    color:var(--text);
    transition: background 0.15s ease;
  }

  .result-row:hover {
    background: color-mix(in srgb, var(--primary) 5%, transparent);
  }

  .result-row:last-child {
    border-bottom:0;
  }

  .thumb {
    border-radius:8px;
    background:linear-gradient(180deg, rgba(0,0,0,0.03), transparent);
    display:grid;
    place-items:center;
    color:var(--muted);
    font-weight:700;
    overflow:hidden;
    flex:0 0 auto;
  }

  .thumb img {
    display:block;
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .thumb.rect {
    width:72px;
    height:108px;
    border-radius:8px;
  }

  .thumb.square {
    width:56px;
    height:56px;
    border-radius:8px;
  }

  .meta {
    display:flex;
    flex-direction:column;
    gap:6px;
    min-width:0;
    margin-right:8px;
  }

  /* scoped to .meta so it doesnt clobber the header .brand .title (unscoped it made the brand title low-contrast) */
  .meta .title {
    font-weight:800;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:48ch;
    color:var(--text);
  }

  .sub {
    color:var(--muted);
    font-size:0.95rem;
  }

  .result-path {
    margin-left:auto;
    font-weight:700;
    color:var(--muted);
    font-size:0.95rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:40ch;
  }

  /* Resume panel - fixed sizing and centered rows */
  #resumePanel {
    margin-top:16px;
    max-width:760px;
    margin-left:auto;
    margin-right:auto;
    background:var(--card-bg);
    border-radius:var(--radius);
    border:1px solid var(--line);
    padding:12px;
    box-shadow:var(--shadow-medium);
    text-align:center;
    overflow:visible;
  }

  #resumePanel h3 {
    margin:0 0 8px;
    font-size:1rem;
    color:var(--text);
  }

  .resume-list {
    display:flex;
    flex-direction:column;
    gap:14px;
    align-items:center;
    justify-content:center;
    max-width:720px;
    margin:0 auto;
  }

  .resume-section {
    display:flex;
    gap:12px;
    align-items:center;
    justify-content:center;
    flex-wrap:nowrap;
  }

  /* Fixed-size resume cards (desktop) */
  .resume-item {
    width:140px;
    height:200px;
    min-width:120px;
    border-radius:8px;
    overflow:hidden;
    position:relative;
    background:linear-gradient(180deg, rgba(0,0,0,0.03), transparent);
    border:1px solid var(--line);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
  }

  /* Resume episode title styling */
  .resume-episode-title {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:28px;
    background:rgba(0,0,0,0.75);
    color:#fff;
    padding:4px 8px;
    border-radius:12px;
    font-weight:600;
    font-size:10px;
    z-index:3;
    max-width:90%;
    overflow:hidden;
    white-space:nowrap;
  }

  .resume-episode-title .marquee {
    display:block;
    white-space:nowrap;
    overflow:hidden;
    position:relative;
    height:14px;
    width:100%;
  }

  .resume-episode-title .m-inner {
    display:inline-block;
    white-space:nowrap;
    will-change:transform;
  }

  .resume-episode-title .m-inner span {
    display:inline-block;
    white-space:nowrap;
  }

  .resume-thumb {
    width:100%;
    height:100%;
    display:block;
    position:relative;
  }

  .resume-thumb img {
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .fallback-text {
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
    text-align:center;
    font-weight:700;
    color:var(--text);
    padding:8px;
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }

  .resume-overlay {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:8px;
    background:rgba(0,0,0,0.6);
    color:#fff;
    padding:6px 10px;
    border-radius:999px;
    font-weight:700;
    font-size:12px;
    z-index:4;
    min-width:40px;
    text-align:center;
    overflow:hidden;
  }

  .resume-overlay.small {
    font-size:11px;
    padding:4px 8px;
    background:rgba(0,0,0,0.55);
  }

  @media (max-width:640px) {
    /* header tweaks */
    header {
      padding:8px 10px;
    }

    .logo {
      height:36px;
      min-width:36px;
    }

    .logo img {
      max-height:28px;
    }

    /* Hide the textual title on small screens */
    .brand .title {
      display:none !important;
    }

    /* header buttons keep the larger touch size */
    .icon-btn {
      width:88px;
      height:48px;
      border-radius:10px;
      font-size:18px;
      padding:0 10px;
      justify-content:center;
      align-items:center;
      display:inline-flex;
      gap:6px;
    }

    .admin-btn {
      width:76px;
      height:44px;
      border-radius:10px;
      display:inline-flex;
      justify-content:center;
      align-items:center;
      padding:0 8px;
    }

    .header-space {
      gap:10px;
    }

    /* Make the tile container use more of the screen */
    .grid {
      max-width:calc(100% - 28px);
      margin:12px 14px 0;
      justify-content:stretch;
      gap:12px;
    }

    /* Make tiles full-width on mobile */
    .tile {
      flex:0 0 100%;
      max-width:none;
      min-height:70px;
      padding:16px;
      font-size:1.05rem;
      box-sizing:border-box;
    }

    /* Results/resume adjustments */
    .welcome-center h1 {
      font-size:1.06rem;
    }

    #resultsPanel {
      top:190px;
      left:8px;
      transform:none;
      width:calc(100% - 16px);
    }

    .resume-list {
      flex-direction:row;
      gap:8px;
      align-items:center;
      justify-content:center;
    }

    .resume-section {
      flex-wrap:nowrap;
    }

    .resume-item {
      width:48%;
      height:auto;
      aspect-ratio:2/3;
      min-width:0;
    }

    .resume-overlay {
      font-size:11px;
    }
  }

  /* marquee helper (used for scrolling episode names) */
  .marquee {
    display:block;
    white-space:nowrap;
    overflow:hidden;
    position:relative;
    height:20px;
    max-width:100%;
  }

  .m-inner {
    display:inline-block;
    white-space:nowrap;
    will-change:transform;
  }

  .m-inner span {
    display:inline-block;
    white-space:nowrap;
  }

  /* Remove button for resume items */
  .resume-remove {
    position:absolute;
    top:4px;
    right:4px;
    width:20px;
    height:20px;
    background:rgba(255, 0, 0, 0.8);
    color:#fff;
    border:none;
    border-radius:50%;
    font-size:12px;
    font-weight:bold;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
    opacity:0;
    transition:opacity 0.2s, transform 0.2s;
    transform:scale(0.8);
  }

  .resume-item:hover .resume-remove {
    opacity:1;
    transform:scale(1);
  }

  .resume-remove:hover {
    background:rgba(255, 0, 0, 1);
    transform:scale(1.1);
  }

  .resume-remove:active {
    transform:scale(0.95);
  }
</style>
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

<header>
  <div class="brand">

      <img src="/logo.png" alt="Jcorp Nomad logo" onerror="this.style.display='none'">

    <div style="min-width:0">
      <div class="title" aria-label="Application title">Jcorp Nomad</div>

  </div>

  <div class="header-space">
    <button id="themeBtn" class="icon-btn" title="Toggle theme" aria-pressed="false" aria-label="Toggle theme">☼</button>

      <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 15.5a3.5 3.5 0 100-7 3.5 3.5 0 000 7z" stroke="currentColor" stroke-width="1.4"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1 1.65 1.65 0 00-.33-1.82L4.31 4.9A2 2 0 017.14 2.07l.06.06c.5.5 1.16.76 1.82.76H9a1.65 1.65 0 001.51-1V1a2 2 0 014 0v.09c.14.6.62 1.09 1.22 1.33l.06.02a2 2 0 012.35-.34l.06.03a2 2 0 01.34 3.14l-.06.06c-.46.46-.66 1.15-.53 1.82h.09a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.2"/></svg>

<main>
  <div class="content-area">
    <div class="welcome-center">
      <h1>Jcorp Nomad</h1>

    <div class="search-row" style="position:relative; z-index:210;">

<script>
/* ---------------- CONFIG ---------------- */
const INDEX_DIR = '/.system-index';
const BUCKETS = ['Movies','Shows','Music','Books','Gallery','Files'];
const THEME_KEY = 'nomad_dark_mode';
const RESUME_KEYS = ['nomad:watch:v1', 'nomad_resume', 'nomad_watch_history', 'nomad_resume_history', 'nomad_resume_cache', 'resume', 'watch_resume'];
const RE_VIDEO = /\.(mp4|mkv|avi|mov|ts|webm|m4v)$/i;
const RE_AUDIO = /\.(mp3|flac|wav|m4a|aac|ogg)$/i;
const RE_IMAGE = /\.(jpe?g|png|webp|gif|heic|avif)$/i;
const RE_BOOK  = /\.(pdf|epub|mobi|azw3|txt)$/i;

// debug logger
function debugLog(...args){
  try { console.debug('[NOMAD]', ...args); } catch(e){ }
}

/* ---------------- UI refs ---------------- */
const themeBtn = document.getElementById('themeBtn');
const searchInput = document.getElementById('searchInput');
const searchLoader = document.getElementById('searchLoader');
const resultsPanel = document.getElementById('resultsPanel');
const resumePanel = document.getElementById('resumePanel');
const resumeList = document.getElementById('resumeList');
const pageBg = document.querySelector('.page-bg');

// warm archives on first focus so theyre open by the time the user stops typing
searchInput.addEventListener('focus', () => {
  warmArchives();
});

/* ---------------- Archive (ZIM) search ----------------
   searches the PC-built sidecar index via NomadArchiveIndex - one small read per
   query, never binary-searches the multi-GB ZIM. media results render first, archive
   hits below. a card with no archives shows zero trace of the feature. */

let __archiveIndex = null;      // NomadArchiveIndex instance
let __archiveIndexReady = null; // Promise: resolves to it, or null if no usable index
let __archivesPresent = false;  // "does the Archive folder have anything?" - set at boot

function loadScriptOnce(src) {
  loadScriptOnce._p = loadScriptOnce._p || {};
  if (!loadScriptOnce._p[src]) {
    loadScriptOnce._p[src] = new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src; s.async = true;
      s.onload = res;
      s.onerror = () => { delete loadScriptOnce._p[src]; rej(new Error('failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }
  return loadScriptOnce._p[src];
}

/* load nomad-zim.js + the sidecar index once. null if no index or zero archives */
function getArchiveIndex() {
  if (__archiveIndexReady) return __archiveIndexReady;
  __archiveIndexReady = (async () => {
    try {
      await loadScriptOnce('/assets/nomad-zim.js?v=idx2');  // ?v defeats a stale cached copy
      const idx = new NomadZim.NomadArchiveIndex('/Archive/.nomad-zim');
      await idx.load();
      if (!idx.manifest || !idx.manifest.archives || !idx.manifest.archives.length) {
        debugLog('archive index has zero archives, treating as absent');
        return null;
      }
      __archiveIndex = idx;
      return idx;
    } catch (e) {
      debugLog('no archive index on card', String(e));
      return null;
    }
  })();
  // if the sidecar has archives, reveal the UI too (usually the boot probe already did).
  // never hides here - the boot probe owns tile visibility
  __archiveIndexReady.then(idx => { if (idx) applyArchiveUI(true); });
  return __archiveIndexReady;
}

   an earlier version did that and it correlated with reboots (the old 2GB stdio crash
   signature) right after the manifest fetch, so keep it on search-focus only. worst
   case the tile takes one focus to appear, way cheaper than the device rebooting. */
function warmArchives() { getArchiveIndex(); }

/* reveal/hide the Archive tile + the "wiki articles" hint in the search placeholder */
function applyArchiveUI(present) {
  searchInput.placeholder = present
    ? 'Search movies, shows, music, books, wiki articles...'
    : 'Search movies, shows, music, books...';
  const archiveTile = document.querySelector('.tile[data-bucket="Archive"]');
  if (archiveTile) archiveTile.style.display = present ? '' : 'none';
}

/* boot-time archive check - the "archive flag". instead of loading the heavy sidecar
   (touches multi-GB files, tied to reboots) we hit /api/archive-list, a cheap directory
   scan that reads no file content and just answers "does /Archive have anything?".
   it 503s if the SD is busy at boot, so retry a few times. */
async function detectArchivesOnBoot(attempt = 0) {
  try {
    const res = await fetch('/api/archive-list', { cache: 'no-store' });
    if (res.ok) {
      const data = await res.json();
      __archivesPresent = !!(data && Array.isArray(data.archives) && data.archives.length);
      applyArchiveUI(__archivesPresent);
      return;
    }
    // 503 (SD busy) or transient error, retry below
  } catch (e) {
    debugLog('archive-list probe failed', String(e));
  }
  if (attempt < 5) setTimeout(() => detectArchivesOnBoot(attempt + 1), 5000);
}

/* Query the index. Returns rows shaped for renderArchiveSection / onResultClick. */
async function archiveSearch(term, limit = 12) {
  const idx = await getArchiveIndex();
  if (!idx) return [];
  const hits = await idx.search(term, limit);
  return hits.map(h => ({
    title: h.title,
    bucket: 'Archive',
    subtype: 'zim',
    archive: h.archiveId,
    // deep link straight to the article by its known location - no lookup on open
    path: '/archive.html?a=' + h.archiveIdx + '&c=' + h.cluster + '&b=' + h.blob +
          '&t=' + encodeURIComponent(h.title),
    preview: null
  }));
}

    /* ---------------- UTIL ---------------- */
    /* Request deduplication cache to prevent spam */
    const __fetchCache = new Map();
    const __fetchInFlight = new Map();

    async function cachedFetch(url, timeoutMs = 3000) {
        // Return cached result if available (60s TTL instead of 5s)
        if (__fetchCache.has(url)) {
            const cached = __fetchCache.get(url);
            if (Date.now() - cached.ts < 60000) return cached.result; // 60 seconds
        }

        // Wait for in-flight request if one exists
        if (__fetchInFlight.has(url)) {
            return await __fetchInFlight.get(url);
        }

        // Make new request
        const promise = (async () => {
            try {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), timeoutMs);
                const r = await fetch(url, {
                    cache: 'no-store',
                    signal: controller.signal,
                    headers: { 'Accept': 'text/plain, application/json, application/x-ndjson, */*' }
                });
                clearTimeout(tid);

                if (!r.ok) {
                    __fetchCache.set(url, { result: null, ts: Date.now() });
                    return null;
                }

                const ct = r.headers.get('content-type') || '';
                const text = await r.text();

                // Detect HTML fallback (server rewriting 404s to index.html)
                if (ct.includes('text/html') || text.trim().startsWith('<!DOCTYPE')) {
                    __fetchCache.set(url, { result: null, ts: Date.now() });
                    return null;
                }

                __fetchCache.set(url, { result: text, ts: Date.now() });
                return text;
            } catch (e) {
                __fetchCache.set(url, { result: null, ts: Date.now() });
                return null;
            } finally {
                __fetchInFlight.delete(url);
            }
        })();

        __fetchInFlight.set(url, promise);
        return promise;
    }
function basenameNoExt(n){ return (n||'').replace(/\.[^/.]+$/,''); }
function friendlyDisplayName(n){ return basenameNoExt((n||'').toString()).replace(/[_\.]+/g,' ').trim(); }
function parseNdjson(text){ if(!text) return []; return text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(l=>{ try{ return JSON.parse(l); }catch(e){ return null; } }).filter(Boolean); }
    async function tryFetchText(url, timeoutMs = 2000) {
        return await cachedFetch(url, timeoutMs);
    }

    async function tryFetchJSON(url, timeoutMs = 2000) {
        const text = await cachedFetch(url, timeoutMs);
        if (!text) return null;

/* ---------------- CLASSIFY ---------------- */
function classifyEntry(obj, parentBucket){
  const name = (obj.n||obj.name||'').toString();
  let path = (obj.path||obj.p||'') || (parentBucket ? `/${parentBucket}/${name}` : name);
  path = normalizePath(path);
  if(obj._type === 'dir' || obj.t === 'd') return { kind:'dir', name, path, raw: obj };
  if(RE_VIDEO.test(name) || RE_VIDEO.test(path)) return { kind:'file', subtype:'video', name, path, raw: obj };
  if(RE_AUDIO.test(name) || RE_AUDIO.test(path)) return { kind:'file', subtype:'audio', name, path, raw: obj };
  if(RE_IMAGE.test(name) || RE_IMAGE.test(path)) return { kind:'file', subtype:'image', name, path, raw: obj };
  if(RE_BOOK.test(name) || RE_BOOK.test(path)) return { kind:'file', subtype:'book', name, path, raw: obj };
  return { kind:'file', subtype:'other', name, path, raw: obj };
}

/* ---------------- SEARCH INDEX ---------------- */
let searchIndexCache = null;
let previewByPath = new Map();
let previewByBaseDir = new Map();

/* Deterministic fallback for preview images  */
function previewPathFromItemPath(itemPath){
  if(!itemPath) return null;
  const p = normalizePath(itemPath);
  const low = p.toLowerCase();

  if(low.startsWith('/movies/')){
    const filename = p.split('/').pop() || '';
    const base = basenameNoExt(filename);
    return `/Movies/${encodeURIComponent(base)}.jpg`;
  }
  if(low.startsWith('/books/')){
    const filename = p.split('/').pop() || '';
    const base = basenameNoExt(filename);
    return `/Books/${encodeURIComponent(base)}.jpg`;
  }
  if(low.startsWith('/shows/')){
    const parts = p.split('/').filter(Boolean);
    if(parts.length >= 2){
      const showName = parts[1];
      return `/Shows/${encodeURIComponent(showName)}.jpg`;
    }
  }
  if(RE_IMAGE.test(p)) return p;
  return null;
}

async function loadSearchIndexFromSD() {
  try {
    const response = await fetch('/.search-index.json?t=' + Date.now());
    if (response.ok) {
      const data = await response.json();
      if (data && data.entries && Array.isArray(data.entries)) {
        console.info('[Search] Loaded cached index from SD card:', data.entries.length, 'entries');
        return data.entries;
      }
    }
  } catch (e) {
    console.log('[Search] No cached index on SD card, will build from scratch');
  }
  return null;
}

async function saveSearchIndexToSD(entries) {
  try {
    const data = { entries, ts: Date.now() };
    const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
    const formData = new FormData();
    formData.append('file', blob, '.search-index.json');
    formData.append('path', '/');

    const response = await fetch('/upload', {
      method: 'POST',
      body: formData
    });

    if (response.ok) {
      console.info('[Search] Saved index to SD card:', entries.length, 'entries');
      return true;
    } else {
      console.warn('[Search] Failed to save index to SD card:', response.status);
    }
  } catch (e) {
    console.error('[Search] Error saving index to SD card:', e);
  }
  return false;
}

/* Builds a robust search index and preview maps (concurrent fetches) */
async function buildSearchIndex(forceRebuild = false){
  if(!forceRebuild && searchIndexCache && searchIndexCache.entries) return searchIndexCache.entries;

  if (!forceRebuild) {
    const cachedEntries = await loadSearchIndexFromSD();
    if (cachedEntries) {
      searchIndexCache = { entries: cachedEntries, ts: Date.now() };
      return cachedEntries;
    }
  }

  // Prevent multiple simultaneous builds
  if (buildSearchIndex._building) {
    return buildSearchIndex._building;
  }

  buildSearchIndex._building = (async () => {
    try {
      previewByPath = new Map();
      previewByBaseDir = new Map();
      const byBucket = {};
      for(const b of BUCKETS) byBucket[b] = [];

      const fetchPromises = BUCKETS.map(b => {
        const idxUrl = `${INDEX_DIR}/${b}.index.ndjson`;
        return tryFetchText(idxUrl).then(txt => ({ bucket: b, txt }));
      });
      const settled = await Promise.allSettled(fetchPromises);
      for(const res of settled){
        if(res.status !== 'fulfilled') continue;
        const { bucket, txt } = res.value || {};
        if(!bucket) continue;
        const arr = parseNdjson(txt || '');
        for(const obj of arr){
          if(!obj) continue;
          const c = classifyEntry(obj, bucket);
          if(!c) continue;
          byBucket[bucket].push(c);
        }
      }

        const nestedFetches = [];
        for (const b of ['Shows', 'Music', 'Gallery']) {
            for (const c of (byBucket[b] || [])) {
                if (c.kind === 'dir') {
                    const candidate = `${INDEX_DIR}${c.path}.index.ndjson`.replace('//', '/');
                    nestedFetches.push({ url: candidate, bucket: b, parentDir: c.path });
                    const encoded = c.path.replace(/^\//, '').replace(/\//g, '__');
                    nestedFetches.push({ url: `${INDEX_DIR}/${encoded}.index.ndjson`, bucket: b, parentDir: c.path });
                }
            }
        }

        // Fetch with concurrency limit (3 at a time, 2s timeout each)
        const nestedResults = [];
        const concurrency = 3;
        for (let i = 0; i < nestedFetches.length; i += concurrency) {
            const batch = nestedFetches.slice(i, i + concurrency);
            const batchPromises = batch.map(async ({ url, bucket, parentDir }) => {
                const text = await tryFetchText(url, 2000); // 2s timeout
                return { bucket, parentDir, text };
            });
            const settled = await Promise.allSettled(batchPromises);
            nestedResults.push(...settled.filter(r => r.status === 'fulfilled').map(r => r.value));
        }
        const nestedSettled = nestedResults;
      for (const data of nestedSettled) {
        if(!data || !data.text) continue;
        const narr = parseNdjson(data.text || '');
        for(const n of narr){
          if(!n) continue;
          const c2 = classifyEntry(n, data.bucket);
          if(!c2) continue;
          c2.parentDir = data.parentDir;
          byBucket[data.bucket].push(c2);
        }
      }

      const entries = [];
      function combineMap(list, bucketName){
        const map = new Map();
        for(const it of list){
          if(it.kind !== 'file') continue;
          const base = basenameNoExt(it.name || it.path.split('/').pop() || '');
          const key = base.toLowerCase();
          if(!map.has(key)) map.set(key, { base, files: [], preview: null, dirs: new Set() });
          map.get(key).files.push(it);
          if(it.path) map.get(key).dirs.add((it.path.replace(/\/[^/]+$/,'') || '').toLowerCase());
          if(it.subtype === 'image' && !map.get(key).preview) map.get(key).preview = it.path;
        }
        for(const [k,v] of map.entries()){
          const video = v.files.find(x => x.subtype === 'video');
          const book  = v.files.find(x => x.subtype === 'book');
          const audio = v.files.find(x => x.subtype === 'audio');
          if(video){
            entries.push({ title: friendlyDisplayName(video.name), bucket: bucketName, subtype:'video', path: video.path, preview: v.preview || null, raw: video.raw });
          } else if(book){
            entries.push({ title: friendlyDisplayName(book.name), bucket: bucketName, subtype:'book', path: book.path, preview: v.preview || null, raw: book.raw });
          } else if(audio && bucketName === 'Music'){
            entries.push({ title: friendlyDisplayName(audio.name), bucket: bucketName, subtype:'audio', path: audio.path, preview:null, raw: audio.raw });
          } else {
            if(bucketName !== 'Movies' && bucketName !== 'Books'){
              const anyFile = v.files[0];
              if(anyFile) entries.push({ title: friendlyDisplayName(anyFile.name || anyFile.path), bucket:bucketName, subtype:anyFile.subtype||'file', path:anyFile.path, preview:v.preview||null, raw:anyFile.raw });
            }
          }
        }
      }

      combineMap(byBucket['Movies'] || [], 'Movies');

      (function(){
        const seriesMap = new Map();
        for(const it of (byBucket['Shows']||[])){
          if(it.kind === 'dir'){
            const key = (it.path || '').toLowerCase();
            if(!seriesMap.has(key)) seriesMap.set(key, { title: it.name || it.path, preview: null, dir: it.path });
          } else if(it.kind === 'file'){
            const parent = (it.parentDir || (it.path.split('/').slice(0,-1).join('/')) || '').toLowerCase();
            const key = parent || basenameNoExt(it.name).toLowerCase();
            if(!seriesMap.has(key)) seriesMap.set(key, { title: it.parentDir || it.name || key, preview: null, dir: it.parentDir || '' });
            if(it.subtype === 'image' && it.parentDir){
              const s = seriesMap.get(key);
              if(s && !s.preview) s.preview = it.path;
            }
          }
        }
        for(const [k,v] of seriesMap.entries()){
          entries.push({ title: friendlyDisplayName(v.title), bucket:'Shows', subtype:'series', path: v.dir, preview: v.preview || null });
        }
      })();

      combineMap(byBucket['Books'] || [], 'Books');

      (function(){
        const seen = new Set();
        for(const g of (byBucket['Gallery']||[])){
          if(g.kind !== 'file') continue;
          const subtype = g.subtype || (RE_VIDEO.test(g.path)?'video':(RE_IMAGE.test(g.path)?'image':'other'));
          const dir = (g.path||'').replace(/\/[^/]+$/,'').toLowerCase();
          const base = basenameNoExt(g.name||g.path).toLowerCase();
          const key = `${base}|${dir}|${subtype}`;
          if(seen.has(key)) continue;
          seen.add(key);
          entries.push({ title: friendlyDisplayName(g.name||g.path), bucket:'Gallery', subtype, path: g.path, preview: subtype==='image'?g.path:null, raw:g.raw });
        }
      })();

      (function(){
        const seen = new Set();
        for(const m of (byBucket['Music']||[])){
          if(m.kind !== 'file' || m.subtype !== 'audio') continue;
          const dir = (m.path||'').replace(/\/[^/]+$/,'').toLowerCase();
          const base = basenameNoExt(m.name).toLowerCase();
          const key = `${base}|${dir}`;
          if(seen.has(key)) continue;
          seen.add(key);
          entries.push({ title: friendlyDisplayName(m.name), bucket:'Music', subtype:'audio', path: m.path, preview:null, raw:m.raw });
        }
      })();

      (function(){
        const seen = new Set();
        for(const f of (byBucket['Files']||[])){
          if(f.kind !== 'file') continue;
          const dir = (f.path||'').replace(/\/[^/]+$/,'').toLowerCase();
          const base = basenameNoExt(f.name).toLowerCase();
          const key = `${base}|${dir}`;
          if(seen.has(key)) continue;
          seen.add(key);
          entries.push({ title: friendlyDisplayName(f.name), bucket:'Files', subtype:'file', path: f.path, preview:null, raw:f.raw });
        }
      })();

      function addMissingFilesFromBucket(bucketName){
        const list = byBucket[bucketName] || [];
        for(const it of list){
          if(it.kind !== 'file') continue;
          if(it.subtype === 'image') continue;
          const norm = normalizePath(it.path || '');
          if(entries.some(e => e.path && normalizePath(e.path) === norm && (e.bucket || '').toLowerCase() === bucketName.toLowerCase())) continue;
          entries.push({
            title: friendlyDisplayName(it.name || it.path || ''),
            bucket: bucketName,
            subtype: it.subtype || 'file',
            path: it.path,
            preview: null,
            raw: it.raw
          });
        }
      }
      addMissingFilesFromBucket('Movies');
      addMissingFilesFromBucket('Books');

      for(const e of entries){
        if(!e.path) continue;
        const p = (e.path || '').toLowerCase();
        if(p.includes('/movies/')) e.bucket = 'Movies';
        else if(p.includes('/shows/')) e.bucket = 'Shows';
        else if(p.includes('/books/')) e.bucket = 'Books';
        else if(p.includes('/gallery/')) e.bucket = 'Gallery';
        else if(p.includes('/music/')) e.bucket = 'Music';
        else if(!e.bucket) e.bucket = 'Files';
      }

      for(const b of ['Movies','Books']){
        for(const it of (byBucket[b]||[])){
          if(it.kind === 'file' && it.subtype === 'image' && it.path){
            const dir = (it.path || '').replace(/\/[^/]+$/,'').toLowerCase();
            const base = basenameNoExt(it.name || it.path).toLowerCase();
            const k = `${base}|${dir}`;
            if(!previewByBaseDir.has(k)) previewByBaseDir.set(k, it.path);
          }
        }
      }

      const finalMap = new Map();
      for(const e of entries){
        if(!e.path) continue;
        const norm = normalizePath(e.path);
        if((e.bucket === 'Movies' || e.bucket === 'Books') && RE_IMAGE.test(norm)) continue;
        if(!finalMap.has(norm)){
          if(!e.preview){
            const dir = (e.path || '').replace(/\/[^/]+$/,'').toLowerCase();
            const base = basenameNoExt(e.title || e.path || '').toLowerCase();
            const k = `${base}|${dir}`;
            if(previewByBaseDir.has(k)) e.preview = previewByBaseDir.get(k);
            else e.preview = previewPathFromItemPath(e.path) || null;
          }
          finalMap.set(norm, e);
        } else {
          const existing = finalMap.get(norm);
          if(!existing.preview && e.preview) existing.preview = e.preview;
          if(!existing.bucket && e.bucket) existing.bucket = e.bucket;
          if((!existing.title || existing.title === '(untitled)') && e.title) existing.title = e.title;
        }
      }

      const finalEntries = Array.from(finalMap.values());

      for(const e of finalEntries){
        if(e.path){
          const norm = normalizePath(e.path);
          const fallback = e.preview || previewPathFromItemPath(e.path) || null;
          previewByPath.set(norm, fallback);
          const dir = (e.path || '').replace(/\/[^/]+$/,'').toLowerCase();
          const base = basenameNoExt(e.title || (e.path||'')).toLowerCase();
          const k = `${base}|${dir}`;
          if(!previewByBaseDir.has(k) && fallback) previewByBaseDir.set(k, fallback);
        }
      }

      searchIndexCache = { entries: finalEntries, ts: Date.now() };
      console.info('Search index built:', finalEntries.length);

      // Save to SD card for future visits
      saveSearchIndexToSD(finalEntries).catch(e => console.warn('[Search] Failed to save to SD:', e));

      return finalEntries;
    } finally {
      delete buildSearchIndex._building;
    }
  })();
  
  return buildSearchIndex._building;
}

function iconSVG(kind){

  if(kind === 'file') return '<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.6"/><path d="M14 2v6h6" stroke="currentColor" stroke-width="1.6"/></svg>';
  if(kind === 'video') return '<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M23 7l-7 5 7 5V7z" fill="currentColor"/><rect x="1" y="5" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>';

/* simple time formatter (mm:ss or h:mm:ss) */
function formatTimeSeconds(sec){
  sec = Number(sec) || 0;
  sec = Math.floor(sec);
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if(h) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}

/* ---------------- RESUME discovery & rendering ---------------- */
function tryParseJSONSafe(str){ if(!str) return null; try{ return JSON.parse(str); }catch(e){ return null; } }
function normalizeResumePayload(payload){
  if(!payload) return [];
  if(Array.isArray(payload)) {
    return payload.map(p => {
      if(!p) return null;
      return {
        path: p.path || p.file || p.p || '',
        title: p.title || p.name || (p.rawTitle || ''),
        position: (p.position || p.pos || p.currentTime || 0),
        updated: p.updated || p.ts || Date.now(),
        raw: p
      };
    }).filter(Boolean);
  }
  if(typeof payload === 'object'){
    const keys = Object.keys(payload || {});
    const looksLikeFileKey = keys.length && keys.every(k => typeof k === 'string' && (k.includes('|') || k.startsWith('/')));
    if(looksLikeFileKey){
      const arr = [];
      for(const k of keys){
        const v = payload[k] || {};
        const pathPart = k.split('|')[0] || k;
        arr.push({
          path: pathPart,
          title: v.title || v.name || pathPart.split('/').pop(),
          position: v.position || v.pos || v.currentTime || 0,
          updated: v.updated || v.ts || Date.now(),
          raw: v
        });
      }
      return arr;
    }
    if(payload.path || payload.file || payload.url || payload.position || payload.pos || payload.title) {
      return [{
        path: payload.path || payload.file || payload.url || '',
        title: payload.title || payload.name || '',
        position: payload.position || payload.pos || 0,
        updated: payload.updated || payload.ts || Date.now(),
        raw: payload
      }];
    }
  }
  return [];
}

/* Try to collect a plausible resume list from localStorage and a few common endpoints */
async function collectResumeItems(){
  for(const k of RESUME_KEYS){
    try {
      const raw = localStorage.getItem(k);
      if(!raw) continue;
      let parsed = tryParseJSONSafe(raw);
      if(!parsed && typeof raw === 'string' && raw.indexOf('\n') !== -1){
        const lines = raw.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        const arr = [];
        for(const ln of lines){
          const p = tryParseJSONSafe(ln);
          if(p) arr.push(p);
        }
        if(arr.length) parsed = arr;
      }
      if(parsed){
        const normalized = normalizeResumePayload(parsed);
        if(normalized && normalized.length) return normalized;
      }
    } catch(e){}
  }

  const tryUrls = ['/resume.json','/.resume.json','/api/resume.json','/.system-resume.json','/resume.ndjson'];
  for(const u of tryUrls){
    try {
      const controller = new AbortController();
      const tid = setTimeout(()=>controller.abort(), 2000);
      const r = await fetch(u, { cache: 'no-store', signal: controller.signal});
      clearTimeout(tid);
      if(!r.ok) continue;
      const text = await r.text();
      if(!text) continue;
      if(text.trim().includes('\n')){
        const arr = [];
        const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
        for(const ln of lines){
          const p = tryParseJSONSafe(ln);
          if(p) arr.push(p);
        }
        if(arr.length){
          const normalized = normalizeResumePayload(arr);
          if(normalized && normalized.length) return normalized;
        }
      } else {
        const j = tryParseJSONSafe(text);
        if(j){
          const normalized = normalizeResumePayload(j);
          if(normalized && normalized.length) return normalized;
        }
      }
    } catch(e){
      // ignore
    }
  }

  return [];
}

function findPreviewForResumeItem(item){
  if(!item || !item.path) return null;
  const norm = normalizePath(item.path);
  if(previewByPath.has(norm)) {
    const p = previewByPath.get(norm);
    if(p) return p;
  }
  const dir = (norm.replace(/\/[^/]+$/,'') || '').toLowerCase();
  const base = basenameNoExt((item.title||norm.split('/').pop()||'')).toLowerCase();
  const key = `${base}|${dir}`;
  if(previewByBaseDir.has(key)) return previewByBaseDir.get(key);
  if(item.preview) return item.preview;
  return previewPathFromItemPath(item.path);
}

/* Render resume area:
*/
function renderResume(items){
  resumeList.innerHTML = '';
  // each render used to inject a <style> per scrolling title and never remove it, leaking one per render
  document.querySelectorAll('style[data-resume-marquee]').forEach(el => el.remove());
  if(!items || !items.length){ resumePanel.style.display = 'none'; return; }

  const normalized = (items||[]).map(it => ({
    path: it.path || it.p || it.file || it.url || '',
    title: it.title || it.name || (it.raw && (it.raw.title || it.raw.name)) || '',
    position: (typeof it.position !== 'undefined' ? it.position : (it.raw && (it.raw.position || it.raw.pos) ? (it.raw.position || it.raw.pos) : 0)),
    updated: it.updated || (it.raw && (it.raw.updated||it.raw.ts)) || Date.now(),
    raw: it.raw || {},
  })).filter(x => x.path);

  // enrich bucket hint
  normalized.forEach(n => {
    if(!n.bucket){
      const p = (n.path||'').toLowerCase();
      if(p.includes('/movies/')) n.bucket = 'Movies';
      else if(p.includes('/shows/')) n.bucket = 'Shows';
      else if(p.includes('/music/')) n.bucket = 'Music';
      else if(p.includes('/books/')) n.bucket = 'Books';
      else if(p.includes('/gallery/')) n.bucket = 'Gallery';
      else n.bucket = 'Files';
    }
  });

  // pick up to 3 of Movies and 3 of Shows (sorted by updated)
  const movies = normalized.filter(n => n.bucket === 'Movies').sort((a,b)=> (b.updated||0)-(a.updated||0)).slice(0,3);
  const shows  = normalized.filter(n => n.bucket === 'Shows').sort((a,b)=> (b.updated||0)-(a.updated||0)).slice(0,3);

  const isMobile = window.matchMedia && window.matchMedia('(max-width:640px)').matches;

  if(isMobile){
    // Mobile: show the most recent Movie and the most recent Show (max 2, side-by-side)
    const picks = [];
    if(movies.length) picks.push(movies[0]);
    if(shows.length) picks.push(shows[0]);
    // fallback: if none found, show up to two generic items
    if(!picks.length) picks.push(...(normalized.slice(0,2)));

    const sec = document.createElement('div'); sec.className = 'resume-section';
    for(const it of picks) sec.appendChild(makeResumeNode(it, true));
    resumeList.appendChild(sec);
    resumePanel.style.display = 'block';
    return;
  }

  // Desktop: render two centered rows:
  // Row 1: Movies (up to 3)
  // Row 2: Shows  (up to 3)
  if(movies.length){
    const msec = document.createElement('div'); msec.className = 'resume-section';
    movies.forEach(it => msec.appendChild(makeResumeNode(it, false)));
    resumeList.appendChild(msec);
  }

  if(shows.length){
    const ssec = document.createElement('div'); ssec.className = 'resume-section';
    shows.forEach(it => ssec.appendChild(makeResumeNode(it, false, true)));
    resumeList.appendChild(ssec);
  }

  if(!movies.length && !shows.length){
    const others = normalized.slice(0,3);
    if(others.length){
      const osec = document.createElement('div'); osec.className = 'resume-section';
      others.forEach(it => osec.appendChild(makeResumeNode(it, false)));
      resumeList.appendChild(osec);
    }
  }

  resumePanel.style.display = 'block';
}

function makeResumeNode(it, compact=false, showMarqueeForShows=false){
  const node = document.createElement('div'); 
  node.className = 'resume-item'; 
  node.setAttribute('role','button');
  node.style.position = 'relative';
  
  const thumb = document.createElement('div'); thumb.className = 'resume-thumb';
  const fallback = document.createElement('div'); fallback.className = 'fallback-text'; fallback.textContent = it.title || it.path.split('/').pop();
  thumb.appendChild(fallback);

  const preview = findPreviewForResumeItem(it);
  if(preview){
    const img = document.createElement('img'); img.src = preview; img.alt = it.title || '';
    img.onload = ()=> { fallback.style.display = 'none'; };
    img.onerror = ()=> { img.style.display='none'; fallback.style.display='flex'; };
    thumb.appendChild(img);
  } else {
    const ext = (it.path || '').split('.').pop() || '';
    const iconWrap = document.createElement('div'); iconWrap.style.display='grid'; iconWrap.style.placeItems='center'; iconWrap.style.width='100%'; iconWrap.style.height='100%';
    if(RE_AUDIO.test('.'+ext)) iconWrap.innerHTML = iconSVG('audio'); else iconWrap.innerHTML = iconSVG('file');
    thumb.appendChild(iconWrap);
  }

  // Check if this is a show episode
  const isShow = (it.path||'').toLowerCase().includes('/shows/');
  
  // For shows: Add episode title with marquee scrolling
  if(isShow && it.title) {
    const episodeTitle = document.createElement('div');
    episodeTitle.className = 'resume-episode-title';
    
    // Create scrolling marquee for episode title similar to shows.html
    const marquee = document.createElement('div');
    marquee.className = 'marquee';
    const inner = document.createElement('div');
    inner.className = 'm-inner';
    const span1 = document.createElement('span');
    const span2 = document.createElement('span');
    
    span1.textContent = it.title;
    span2.textContent = it.title;
    
    inner.appendChild(span1);
    inner.appendChild(span2);
    marquee.appendChild(inner);
    episodeTitle.appendChild(marquee);
    
    // Animate the marquee
    requestAnimationFrame(() => {
      const textWidth = span1.getBoundingClientRect().width || (it.title.length * 7);
      const containerWidth = episodeTitle.getBoundingClientRect().width || 120;
      
      if (textWidth > containerWidth - 16) { // Only scroll if text is longer than container
        span1.style.paddingRight = '40px';
        const totalWidth = textWidth + 40;
        const duration = Math.max(6, Math.min(20, totalWidth / 20));
        
        // Create unique keyframes for this marquee
        const keyName = `episode-scroll-${Date.now()}-${Math.random().toString(36).substr(2, 5)}`;
        const rule = `@keyframes ${keyName} { 0% { transform: translateX(0); } 100% { transform: translateX(-${totalWidth}px); } }`;
        const style = document.createElement('style');
        style.setAttribute('data-resume-marquee', '1');
        style.textContent = rule;
        document.head.appendChild(style);
        
        inner.style.animation = `${keyName} ${duration}s linear infinite`;
      }
    });
    
    thumb.appendChild(episodeTitle);
  }

  // Time overlay (positioned below episode title for shows)
  const overlay = document.createElement('div'); 
  overlay.className = 'resume-overlay small';
  overlay.style.opacity = '0';
  overlay.style.transform = 'translateY(6px)';
  overlay.style.display = 'flex';
  overlay.style.justifyContent = 'center';
  overlay.style.alignItems = 'center';
  overlay.style.left = '50%';
  overlay.style.transform = 'translateX(-50%) translateY(6px)';
  overlay.style.maxWidth = '86%';
  overlay.textContent = it.position ? formatTimeSeconds(it.position) : '0s';
  
  thumb.appendChild(overlay);

  // Animate overlay in
  requestAnimationFrame(()=> {
    overlay.style.transition = 'opacity .28s cubic-bezier(.2,.9,.2,1), transform .28s cubic-bezier(.2,.9,.2,1)';
    overlay.style.opacity = '1';
    overlay.style.transform = 'translateX(-50%) translateY(0)';
  });

  // CREATE REMOVE BUTTON
  const removeBtn = document.createElement('button');
  removeBtn.className = 'resume-remove';
  removeBtn.innerHTML = '×';
  removeBtn.title = 'Remove from resume';
  removeBtn.setAttribute('aria-label', 'Remove from resume');
  
  // Remove button click handler
  removeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    removeResumeItem(it.path);
  });

  node.appendChild(thumb);
  node.appendChild(removeBtn);

  // Resume item click handler
  node.addEventListener('click', ()=> {
    const p = it.path || '';
    const resumePos = it.position || 0;

    if((p||'').toLowerCase().includes('/movies/')) {
      window.location.href = `/movies.html#play=${encodeURIComponent(p)}`;
    } else if((p||'').toLowerCase().includes('/shows/')) {
      window.location.href = `/shows.html#play=${encodeURIComponent(p)}`;
    } else if((p||'').toLowerCase().includes('/music/')) {
      window.location.href = `/music#play=${encodeURIComponent(p)}`;
    } else if((p||'').toLowerCase().includes('/gallery/')) {
      window.location.href = `/gallery#open=${encodeURIComponent(p)}`;
    } else if((p||'').toLowerCase().includes('/books/')) {
      const url = p.startsWith('/') ? p : '/' + p;
      window.location.href = url;
    } else {
      window.location.href = (p.startsWith('/') ? p : '/' + p);
    }
  });

  return node;
}

/* Remove item from resume cache and refresh display */
async function removeResumeItem(itemPath) {
  if (!itemPath) return;
  
  // Find and modify localStorage data
  for (const key of RESUME_KEYS) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) continue;
      
      let parsed = tryParseJSONSafe(raw);
      if (!parsed) continue;
      
      let modified = false;
      
      if (Array.isArray(parsed)) {
        // Remove item from array
        const originalLength = parsed.length;
        parsed = parsed.filter(item => {
          const path = item.path || item.file || item.p || item.url || '';
          return path !== itemPath;
        });
        modified = parsed.length !== originalLength;
      } else if (typeof parsed === 'object') {
        // Handle object format (key-value pairs)
        const keys = Object.keys(parsed);
        for (const k of keys) {
          const pathPart = k.split('|')[0] || k;
          if (pathPart === itemPath) {
            delete parsed[k];
            modified = true;
            break;
          }
        }
      }
      
      if (modified) {
        // Save back to localStorage
        localStorage.setItem(key, JSON.stringify(parsed));
        
        // Refresh the resume display
        const updatedItems = await collectResumeItems();
        renderResume(updatedItems);
        break;
      }
    } catch (e) {
      console.warn('Error removing resume item:', e);
    }
  }
}
/* ---------------- SEARCH UI & Logic ---------------- */
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function shortenPath(p){ if(!p) return ''; const parts = p.split('/'); if(parts.length <= 3) return p; return '…' + parts.slice(-3).join('/'); }
function debounce(func, wait, immediate) {
  let timeout, lastCallTime = 0;
  return function executedFunction(...args) {
    const context = this;
    const now = Date.now();
    
    // Prevent excessive calls
    if (now - lastCallTime < wait) {
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        lastCallTime = Date.now();
        func.apply(context, args);
      }, wait);
      return;
    }
    
    lastCallTime = now;
    clearTimeout(timeout);
    
    if (immediate && !timeout) {
      func.apply(context, args);
    } else {
      timeout = setTimeout(() => {
        func.apply(context, args);
      }, wait);
    }
  };
}
function renderResults(rows, q){
  resultsPanel.innerHTML = '';
  if(!rows || rows.length === 0){
    resultsPanel.style.display = 'block';
    resultsPanel.innerHTML = `<div style="padding:12px;color:var(--muted)">No results for <strong>${escapeHtml(q)}</strong></div>`;
    return;
  }
  const frag = document.createDocumentFragment();
  for(const r of rows.slice(0,250)){
    const row = document.createElement('div'); row.className = 'result-row';
    const thumb = document.createElement('div'); thumb.className = 'thumb';
    const bucket = (r.bucket||'').toLowerCase();
    const subtype = r.subtype || '';

    let preview = r.preview || null;
    if(!preview){
      const norm = normalizePath(r.path || '');
      if(previewByPath.has(norm)) preview = previewByPath.get(norm);
    }
    if(!preview){
      const dir = ((r.path||'').replace(/\/[^/]+$/,'') || '').toLowerCase();
      const base = basenameNoExt((r.title||r.path||'')).toLowerCase();
      const k = `${base}|${dir}`;
      if(previewByBaseDir.has(k)) preview = previewByBaseDir.get(k);
    }
    if(!preview) preview = previewPathFromItemPath(r.path || '');

    if(bucket === 'movies' || bucket === 'shows' || bucket === 'books'){
      thumb.classList.add('rect');
      const img = document.createElement('img');
      if(preview){
        img.src = preview;
        img.alt = r.title || '';
        img.loading = 'lazy';
        img.onerror = ()=> { img.style.display='none'; thumb.innerHTML = iconSVG(subtype === 'audio' ? 'audio' : (subtype === 'video' ? 'video' : 'file')); };
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = iconSVG(subtype === 'video' ? 'video' : 'file');
      }
    } else if(bucket === 'gallery'){
      thumb.classList.add('square');
      if(preview){
        const img = document.createElement('img'); img.src = preview; img.alt = r.title || ''; img.loading='lazy';
        img.onerror = ()=> { img.style.display='none'; thumb.innerHTML = iconSVG('file'); };
        thumb.appendChild(img);
      } else {
        thumb.innerHTML = iconSVG('file');
      }
    } else {
      thumb.classList.add('square');
      if(bucket === 'music') thumb.innerHTML = iconSVG('audio');
      else if(bucket === 'files') thumb.innerHTML = iconSVG('file');
      else if(subtype === 'video') thumb.innerHTML = iconSVG('video');
      else thumb.innerHTML = iconSVG('file');
    }

    const meta = document.createElement('div'); meta.className = 'meta';
    const title = document.createElement('div'); title.className = 'title'; title.textContent = friendlyDisplayName(r.title || r.path || '(untitled)');
    const sub = document.createElement('div'); sub.className = 'sub';
    const ext = (r.path || '').split('.').pop() || '';
    let subTxt = (r.bucket || '');
    if(ext && ext.length <= 4) subTxt += ` • .${ext}`;
    sub.textContent = subTxt;
    meta.appendChild(title); meta.appendChild(sub);

    const pathDiv = document.createElement('div'); pathDiv.className = 'result-path'; pathDiv.textContent = shortenPath(r.path);
    row.appendChild(thumb); row.appendChild(meta); row.appendChild(pathDiv);
    row.addEventListener('click', ()=> onResultClick(r));
    frag.appendChild(row);
  }
  resultsPanel.appendChild(frag);
  resultsPanel.style.display = 'block';
}

// ---------- performSearch (media first, archive section appended after) ----------
let buildPromise = null;
let __searchToken = 0;
async function performSearch(q){
  const term = (q||'').trim();
  if(!term){ resultsPanel.style.display = 'none'; resultsPanel.innerHTML=''; return []; }
  const myToken = ++__searchToken;

  // Build media index and search
  let mediaResults = [];
  try {
    searchLoader.style.display = 'block';
    if(!buildPromise) buildPromise = buildSearchIndex();
    const idx = await buildPromise;
    const t = term.toLowerCase();
    for(const e of idx){
      const hay = `${(e.title||'') + ' ' + (e.path||'') + ' ' + (e.bucket||'')}`.toLowerCase();
      if(hay.includes(t)) mediaResults.push(e);
    }
    // initial sort for immediate render 
    mediaResults.sort((a,b)=>{
      const p = x => ((x.title||'').toLowerCase().startsWith(term.toLowerCase()) ? 0 : 1);
      if(p(a)!==p(b)) return p(a)-p(b);
      const order = { Movies:0, Shows:1, Music:2, Gallery:3, Books:4, Files:5 };
      return (order[a.bucket]||9) - (order[b.bucket]||9);
    });

    // render only the media results immediately
    renderResults(mediaResults, q);
  } catch (e) {
    console.error('media search fail', e);
    resultsPanel.innerHTML = `<div style="padding:12px;color:darkred">Search error</div>`;
    resultsPanel.style.display = 'block';
  } finally {
    searchLoader.style.display = 'none';
  }

  // ------- Archive (ZIM) results below media -----
  // media keeps priority (above, never reordered). the archive query is a couple of
  // tiny reads so its fast. a newer keystroke abandons this run
  const stillCurrent = () => myToken === __searchToken;
  try {
    const idx = await getArchiveIndex();
    if (idx && stillCurrent()) {
      renderArchiveSection([], 'Searching…');
      const zrows = await archiveSearch(term, 12);
      if (stillCurrent()) {
        renderArchiveSection(zrows, zrows.length ? null : 'No matches');
      }
    }
  } catch (e) {
    console.warn('archive search failed', e);
    // show the failure instead of hanging on "Searching…"
    const msg = /abort/i.test(String(e && e.name) + String(e && e.message)) ? 'Timed out' : 'Search error';
    if (stillCurrent()) renderArchiveSection([], msg);
  }

  return mediaResults;
}

function onResultClick(item){
  const p = item.path || '';
  if(item.bucket === 'Files'){
    const url = p.startsWith('/') ? p : '/' + p;
    const a = document.createElement('a'); a.href = url; a.download = item.title || ''; document.body.appendChild(a); a.click(); a.remove();
    return;
  }
  if(item.bucket === 'Books'){
    const url = (p.startsWith('/') ? p : '/' + p);
    window.location.href = url;
    return;
  }
  if(item.bucket === 'Movies'){ window.location.href = `/movies#open=${encodeURIComponent(p)}`; return; }
  if(item.bucket === 'Shows'){ window.location.href = `/shows#open=${encodeURIComponent(p)}`; return; }
  if(item.bucket === 'Music'){ window.location.href = `/music#play=${encodeURIComponent(p)}`; return; }
  if(item.bucket === 'Gallery'){ window.location.href = `/gallery#open=${encodeURIComponent(p)}`; return; }

  
  if(item.bucket === 'Archive') {
    window.location.href = item.path; // /archive.html?a=<idx>&c=<cluster>&b=<blob> deep link
    return;
  }

  window.location.href = `/${(item.bucket||'').toLowerCase()}`;
}

/* Wiring & events */
searchInput.addEventListener('input', debounce((e) => {
  const v = e.target.value || '';
  if(!v.trim()){ resultsPanel.style.display='none'; resultsPanel.innerHTML=''; return; }
  performSearch(v);
}, 500)); // Increased from 200ms to 500ms

document.addEventListener('click', (ev) => {
