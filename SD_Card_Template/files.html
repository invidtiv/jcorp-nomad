<!DOCTYPE html>
<!-- Nomad Files Page -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Jcorp Nomad Media Server – Files" />
  <title>Nomad • Files</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    :root {
      --primary: #007bff;
      --primary-dark: #0056b3;
      --bg: #f4f4f9;
      --text: #333;
      --radius: 8px;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html,body{height:100%}
    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 0 0.5rem;
    }

    /* Dark mode  */
    body.dark {
      background: #07121a;
      color: #e6eef8;
    }
    body.dark header { background: #052233; color: #e9f4ff; }
    body.dark .toolbar { background: #07121a; border-bottom-color: rgba(255,255,255,0.04); }
    body.dark .file-list li { background: #071827; box-shadow: 0 6px 18px rgba(0,0,0,0.35); color: #e6eef8; }
    body.dark .back-btn { background: #03314a; color: #e6eef8; }
    body.dark a { color: var(--primary); }
    body.dark .file-info { color: #9fb6cc; }

    header {
      background: var(--primary);
      color: #fff;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 50;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    header h1 { font-size: 1.5rem; white-space: nowrap; }
    .back-btn {
      color: #fff;
      text-decoration: none;
      background: var(--primary-dark);
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      white-space: nowrap;
    }

    .toolbar {
      background: var(--bg);
      padding: 0.75rem 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 56px;
      z-index: 45;
      justify-content: flex-end;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
    }
    .toolbar input[type="search"] {
      flex: 1 1 200px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: var(--radius);
      font-size: 0.9rem;
      min-width: 0;
    }
    /* keep search visible  */
    body.dark .toolbar input[type="search"] { background: #fff; color: #000; }

    .toolbar select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: var(--radius);
      font-size: 0.9rem;
      min-width: 120px;
    }

    main {
      flex: 1;
      padding: 1rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    ul.file-list { list-style: none; padding: 0; margin: 0; }
    ul.file-list li {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 0.75rem 1rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      word-break: break-word;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.3s forwards;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ul.file-list li a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 60%;
      display: inline-block;
    }
    .file-info {
      font-size: 0.85rem;
      color: #555;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 110px;
      text-align: right;
    }
    footer {
      padding: 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-left: -0.5rem;
      margin-right: -0.5rem;
      padding-left: calc(1rem + 0.5rem);
      padding-right: calc(1rem + 0.5rem);
    }

    @media (max-width: 600px) {
      body { padding: 0 0.25rem; }
      header { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
      header h1 { white-space: normal; font-size: 1.3rem; }
      .back-btn { width: 100%; text-align: center; white-space: normal; }
      .toolbar { flex-direction: column; align-items: stretch; justify-content: center; padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
      .toolbar input[type="search"], .toolbar select { flex: none; width: 100%; min-width: auto; }
      main { padding: 0.75rem 0.5rem; width: 100%; }
      ul.file-list li { flex-direction: column; align-items: flex-start; gap: 0.5rem; padding: 0.5rem 0.75rem; }
      ul.file-list li a { max-width: 100%; white-space: normal; word-break: break-word; }
      .file-info { white-space: normal; width: 100%; text-align: left; min-width: auto; }
      footer { padding-left: calc(1rem + 0.25rem); padding-right: calc(1rem + 0.25rem); margin-left: -0.25rem; margin-right: -0.25rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Files</h1>
    <a class="back-btn" href="/menu">← Back to Menu</a>
  </header>

  <div class="toolbar">
    <input id="searchInput" type="search" placeholder="Search files…" aria-label="Search files" />
    <select id="typeFilter" aria-label="Filter by type">
      <option value="all">All</option>
      <option value="pdf">PDF</option>
      <option value="txt">TXT</option>
      <option value="zip">ZIP</option>
      <option value="mp3">MP3</option>
      <option value="mp4">MP4</option>
      <option value="html">HTML</option>
      <option value="stl">STL</option>
      <option value="png">PNG</option>
      <option value="jpg">JPG</option>
      <option value="exe">EXE</option>
      <option value="docx">DOCX</option>
      <option value="xlsx">XLSX</option>
      <option value="pptx">PPTX</option>
    </select>
    <select id="sortSelect" aria-label="Sort files">
      <option value="nameAsc">Name A→Z</option>
      <option value="nameDesc">Name Z→A</option>
      <option value="sizeAsc">Size ↑</option>
      <option value="sizeDesc">Size ↓</option>
      <option value="typeAsc">Type ↑</option>
      <option value="typeDesc">Type ↓</option>
    </select>
  </div>

  <main>
    <ul id="fileList" class="file-list"></ul>
  </main>

  <footer>© <span id="year"></span> Jcorp Nomad</footer>

  <script>
    /* ---------- THEME ---------- */
    const THEME_KEY = 'nomad.dark';
    const files = [];
    let filtered = [];

    function applyThemeFlag(dark) {
      const isDark = !!dark;
      document.body.classList.toggle('dark', isDark);
      try {
        // store explicit string to avoid ambiguity when reading back
        localStorage.setItem(THEME_KEY, isDark ? 'true' : 'false');
      } catch (e) {
        console.warn('Could not persist theme preference:', e);
      }
    }

    function initThemeFromStorage() {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved !== null) {
        applyThemeFlag(saved === 'true');
      } else {
        // No explicit saved preference 
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        applyThemeFlag(prefersDark);
      }

      try {
        if (window.matchMedia) {
          const mq = window.matchMedia('(prefers-color-scheme: dark)');
          const onChange = (e) => {
            // only auto-update if user hasn't explicitly set a preference
            if (localStorage.getItem(THEME_KEY) === null) {
              applyThemeFlag(e.matches);
            }
          };
          // use modern API when available
          if (typeof mq.addEventListener === 'function') {
            mq.addEventListener('change', onChange);
          } else if (typeof mq.addListener === 'function') {
            mq.addListener(onChange);
          }
        }
      } catch (e) {
        console.warn('Could not attach prefers-color-scheme listener:', e);
      }
    }

    function formatBytes(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    async function fetchIndexWithFallback(path) {
      const INDEX_ENDPOINT = '/api/index';
      const FALLBACK_INDEX_FILES = ['Files.index.ndjson', '.system-index/Files.index.ndjson'];

      function joinPaths(a, b) {
        return (a || '').replace(/\/+$/, '') + '/' + (b || '').replace(/^\/+/, '');
      }

      function normalizePath(p) {
        return '/' + (p || '').replace(/^\/+/, '').replace(/\/+$/, '');
      }

      // Try the API index first. If the API responds but the index is partial
      // (header.count > entries.length) fall back to static index files.
      try {
        const apiUrl = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}&_=${Date.now()}`;
        const res = await fetch(apiUrl, { cache: 'no-store', credentials: 'same-origin' });

        if (res.status === 202) {
          // Server indicates index is being built
          console.log('Files index is building (202 status)');
          return { source: null, header: null, entries: [] };
        }

        if (res.ok) {
          const text = await res.text();
          // parseNDJSONWithHeader is defined later in the file
          const parsed = parseNDJSONWithHeader(text);

          // If no header signature, treat as unavailable to avoid trusting incorrect data
          if (!parsed.header || !parsed.header.sig) {
            console.warn('No index signature found in API response. Falling back to static files if available.');
          } else {
            // If header declares a count and we have a full set, return it.
            if (parsed.header.count === undefined || parsed.entries.length >= parsed.header.count) {
              if (parsed.entries && parsed.entries.length > 0) {
                return { source: 'api', header: parsed.header, entries: parsed.entries };
              }
            } else {
              // Partial index from API -> fall through to try fallback files.
              console.warn('Partial index received from API; attempting static fallback files.');
            }
          }
        }
      } catch (e) {
        console.error('Files index fetch error (API):', e);
      }

      // Try fallback static index files in order
      for (const fname of FALLBACK_INDEX_FILES) {
        try {
          const pathAttempt = joinPaths(path, fname);
          const url = pathAttempt + '?_=' + Date.now();
          const res = await fetch(url, { cache: 'no-store', credentials: 'same-origin' });
          if (!res.ok) continue;
          const text = await res.text();
          const parsed = parseNDJSONWithHeader(text);
          if (parsed.entries && parsed.entries.length > 0) {
            return { source: pathAttempt, header: parsed.header, entries: parsed.entries };
          }
        } catch (e) {
          console.warn('Fallback file attempt failed:', fname, e);
        }
      }

      // No index found at all
      console.warn('No files index found in API or fallback files');
      return { source: null, header: null, entries: [] };
    }

    // Updated init function with better error handling
    async function init() {
      try {
        const fileListEl = document.getElementById('fileList');
        fileListEl.innerHTML = '<li>Loading files...</li>';

        // Try to fetch using the new indexing system
        const resp = await fetchIndexWithFallback('/');
        if (resp.entries && resp.entries.length > 0) {
          files.length = 0;
          files.push(...resp.entries
            .filter(Boolean)
            .filter(obj => obj.t === 'f' || obj.type === 'f') // ensure only files
            .map(obj => {
              const path = obj.p || obj.path || (obj.n && obj.n.startsWith('/') ? obj.n : '/' + (obj.n || ''));
              const ext = (obj.n || obj.name || '').split('.').pop().toLowerCase();
              return {
                name: obj.n || obj.name || path.split('/').pop(),
                path: path,
                type: ext,
                size: obj.sz || obj.size || 0
              };
            })
          );
        } else {
          // fallback: try media.json or /media.json (backup for legacy system)
          try {
            const r = await fetch('/media.json', {cache:'no-store', credentials:'same-origin'});
            if (r.ok) {
              const j = await r.json();
              const raw = j.files || j.Files || [];
              files.length = 0;
              files.push(...raw.map(obj => {
                const p = obj.path || obj.file || obj.url || ('/' + (obj.name || ''));
                const name = obj.name || obj.title || p.split('/').pop();
                const ext = (name.split('.').pop() || '').toLowerCase();
                return { name, path: p, type: ext, size: obj.sz || obj.size || 0 };
              }).filter(Boolean));
            } else {
              throw new Error('no fallback data');
            }
          } catch (e) {
            console.error('No index available to build Files list', e);
            fileListEl.innerHTML = '<li>No files found. The index may be building.</li>';
            return;
          }
        }

        applyFilters();
      } catch (e) {
        console.error('Error loading files:', e);
        document.getElementById('fileList').innerHTML = '<li>Error loading files.</li>';
      }
    }
    function parseNDJSONWithHeader(text) {
      const lines = (text || '').split('\n').filter(Boolean);
      if (lines.length === 0) return { header: null, entries: [] };

      try {
        const header = JSON.parse(lines[0]);
        const entries = lines.slice(1).map(line => JSON.parse(line));
        return { header, entries };
      } catch (e) {
        console.warn('NDJSON parse failed, trying raw lines:', e);
        const safeJsonParse = (line) => {
          try { return JSON.parse(line); } catch (_) { return null; }
        };
        return { header: null, entries: lines.map(safeJsonParse).filter(Boolean) };
      }
    }

    async function fetchIndexWithFallback(path) {
      const INDEX_ENDPOINT = '/api/index';
      const FALLBACK_INDEX_FILES = ['.system-index/Files.index.ndjson', 'Files.index.ndjson'];

      function joinPaths(a, b) {
        return (a || '').replace(/\/+$/, '') + '/' + (b || '').replace(/^\/+/, '');
      }

      function normalizePath(p) {
        return '/' + (p || '').replace(/^\/+/, '').replace(/\/+$/, '');
      }

      try {
        const apiUrl = `${INDEX_ENDPOINT}?path=${encodeURIComponent(normalizePath(path))}&_=${Date.now()}`;
        const res = await fetch(apiUrl, { cache:'no-store', credentials:'same-origin' });
        if (res.ok) {
          const text = await res.text();
          const parsed = parseNDJSONWithHeader(text);

          // Check if we have a valid header signature
          if (!parsed.header || !parsed.header.sig) {
            console.warn('No index signature found in files. Index may be building or missing.');
            // Don't trigger reindex to avoid loops.
            return { source: null, header: null, entries: [] };
          }

          if (parsed.header && parsed.header.count !== undefined && parsed.entries.length < parsed.header.count) {
            // partial -> fallback
          } else if (parsed.entries.length > 0) {
            return { source: 'api', header: parsed.header, entries: parsed.entries };
          }
        } else if (res.status === 202) {
          // Server is building index
          console.log('Files index is building (202 status)');
          return { source: null, header: null, entries: [] };
        }
      } catch (e) {
        console.error('Files index fetch error:', e);
      }

      // Try fallback files
      for (const fname of FALLBACK_INDEX_FILES) {
        try {
          const pathAttempt = joinPaths(path, fname);
          const url = pathAttempt + '?_=' + Date.now();
          const res = await fetch(url, { cache:'no-store', credentials:'same-origin' });
          if (res.ok) {
            const text = await res.text();
            const parsed = parseNDJSONWithHeader(text);
            if (parsed.entries && parsed.entries.length > 0) {
              return { source: pathAttempt, header: parsed.header, entries: parsed.entries };
            }
          }
        } catch (e) {
          console.warn('Fallback file attempt failed:', fname, e);
        }
      }

      // No index found at all
      console.warn('No files index found in API or fallback files');
      return { source: null, header: null, entries: [] };
    }

    // Updated init function with better error handling
    async function init() {
      try {
        const fileListEl = document.getElementById('fileList');
        fileListEl.innerHTML = '<li>Loading files...</li>';

        // Try to fetch using the new indexing system
        const resp = await fetchIndexWithFallback('/');
        if (resp.entries && resp.entries.length > 0) {
          files.length = 0;
          files.push(...resp.entries
            .filter(Boolean)
            .filter(obj => obj.t === 'f' || obj.type === 'f') // ensure only files
            .map(obj => {
              const path = obj.p || obj.path || (obj.n && obj.n.startsWith('/') ? obj.n : '/' + (obj.n || ''));
              const ext = (obj.n || obj.name || '').split('.').pop().toLowerCase();
              return {
                name: obj.n || obj.name || path.split('/').pop(),
                path: path,
                type: ext,
                size: obj.sz || obj.size || 0
              };
            })
          );
        } else {
          // fallback: try media.json or /media.json
          try {
            const r = await fetch('/media.json', {cache:'no-store', credentials:'same-origin'});
            if (r.ok) {
              const j = await r.json();
              const raw = j.files || j.Files || [];
              files.length = 0;
              files.push(...raw.map(obj => {
                const p = obj.path || obj.file || obj.url || ('/' + (obj.name || ''));
                const name = obj.name || obj.title || p.split('/').pop();
                const ext = (name.split('.').pop() || '').toLowerCase();
                return { name, path: p, type: ext, size: obj.sz || obj.size || 0 };
              }).filter(Boolean));
            } else {
              throw new Error('no fallback data');
            }
          } catch (e) {
            console.error('No index available to build Files list', e);
            fileListEl.innerHTML = '<li>No files found. The index may be building.</li>';
            return;
          }
        }

        applyFilters();
      } catch (e) {
        console.error('Error loading files:', e);
        document.getElementById('fileList').innerHTML = '<li>Error loading files.</li>';
      }
    }

    function applyFilters() {
      const term = (searchInput.value || '').trim().toLowerCase();
      const type = typeFilter.value;
      filtered = files.filter(f =>
        (term === '' || (f.name || '').toLowerCase().includes(term)) &&
        (type === 'all' || (f.type || '').toLowerCase() === type)
      );
      applySort();
    }

    function applySort() {
      const mode = sortSelect.value;
      filtered.sort((a, b) => {
        if (mode === 'nameAsc') return (a.name || '').localeCompare(b.name || '');
        if (mode === 'nameDesc') return (b.name || '').localeCompare(a.name || '');
        if (mode === 'sizeAsc') return (a.size || 0) - (b.size || 0);
        if (mode === 'sizeDesc') return (b.size || 0) - (a.size || 0);
        if (mode === 'typeAsc') return (a.type || '').localeCompare(b.type || '');
        if (mode === 'typeDesc') return (b.type || '').localeCompare(a.type || '');
        return 0;
      });
      render();
    }

    function render() {
      fileListEl.innerHTML = '';
      filtered.forEach((f, i) => {
        const li = document.createElement('li');
        li.style.animationDelay = `${i * 50}ms`;

        const link = document.createElement('a');
        // clicking a file in the menu triggers downloads. For direct clicks here:
        // set the href to the canonical path (server serves it) and let browser download
        link.href = f.path;
        link.download = f.name;
        link.textContent = f.name;
        link.title = f.name;

        const info = document.createElement('div');
        info.className = 'file-info';
        info.textContent = `${(f.type || '').toUpperCase()} • ${formatBytes(f.size || 0)}`;

        li.appendChild(link);
        li.appendChild(info);
        fileListEl.appendChild(li);
      });
    }

    searchInput.addEventListener('input', () => { clearTimeout(window.__debounce); window.__debounce = setTimeout(applyFilters, 150); });
    typeFilter.addEventListener('change', applyFilters);
    sortSelect.addEventListener('change', applySort);

    // Boot
    initThemeFromStorage();
    init();
  </script>
</body>
</html>
